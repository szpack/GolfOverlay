<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Golf Overlay Tool v4.4</title>
<style>
:root{
  --mg:#1B5E3B;--gold:#B8962E;--bg:#0d1117;--s1:#161b22;--s2:#21262d;
  --bd:#30363d;--t1:#e6edf3;--t2:#8b949e;--t3:#484f58;
  --red:#C0392B;--blue:#1a5bb5;--green:#2a7a2a;--purple:#7b2d9e;--ghi:#00e676;
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html,body{height:100%;overflow:hidden}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',system-ui,sans-serif;background:var(--bg);color:var(--t1);display:flex;flex-direction:column}

/* ── HEADER ── */
#hdr{display:flex;align-items:center;gap:8px;padding:6px 12px;background:var(--s1);border-bottom:1px solid var(--bd);flex-shrink:0}
.logo{font-family:Impact,'Arial Black',sans-serif;font-size:16px;letter-spacing:1px;color:var(--gold);white-space:nowrap;flex-shrink:0}
.logo span{color:#fff}
.logo-meta{font-size:9px;color:var(--t3);margin-left:4px;white-space:nowrap;flex-shrink:0;line-height:1.2}
#hdr .sp{flex:1}
#lang-toggle{display:flex;border:1px solid var(--bd);border-radius:5px;overflow:hidden;flex-shrink:0}
.lang-btn{padding:0 9px;height:28px;border:none;background:transparent;color:var(--t2);font:600 11px/1 inherit;cursor:pointer;display:flex;align-items:center;gap:3px}
.lang-btn.active{background:var(--s2);color:var(--t1)}
#btn-settings{height:28px;padding:0 10px;border-radius:5px;border:1px solid var(--bd);background:var(--s2);color:var(--t2);font:600 11px/1 inherit;cursor:pointer;flex-shrink:0;white-space:nowrap}
#btn-new{height:32px;padding:0 14px;border-radius:6px;border:2px solid #c0392b;background:#7d1a1a;color:#ffc;font:700 12px/1 inherit;cursor:pointer;flex-shrink:0}
#btn-new:active{background:#5c1414}
select,input[type=text],input[type=number]{background:var(--s2);border:1px solid var(--bd);color:var(--t1);border-radius:6px;padding:5px 8px;font:13px/1 inherit;outline:none;height:32px}
select:focus,input:focus{border-color:#2ea043}

/* ── MAIN ── */
#main{display:grid;grid-template-columns:1fr 340px;flex:1;overflow:hidden}

/* ── LEFT ── */
#left{display:flex;flex-direction:column;overflow:hidden;border-right:1px solid var(--bd)}
#preview{flex:1;position:relative;overflow:hidden;background:#111}
#bg-img{position:absolute;inset:0;width:100%;height:100%;object-fit:contain;pointer-events:none;z-index:1}
#cv{position:absolute;z-index:3}
/* K FIX: file input covers preview. canvas is z:3, so click on canvas calls our drag handler. */
/* If drag is not active, we trigger bg upload. See JS for detail. */
/* bg-file-cover: hidden off-screen, triggered programmatically only */
#bg-file-cover{position:fixed;top:-100px;left:-100px;width:1px;height:1px;opacity:0;pointer-events:none}
#upload-hint{position:absolute;inset:0;z-index:4;display:flex;flex-direction:column;align-items:center;justify-content:center;pointer-events:none}
#upload-hint .uh-box{border:2px dashed var(--bd);border-radius:10px;padding:18px 24px;display:flex;flex-direction:column;align-items:center;gap:8px;color:var(--t3);font-size:12px;text-align:center;background:rgba(0,0,0,.35)}
#upload-hint .uh-box .ic{font-size:26px}
#upload-hint.hidden{display:none}

/* D: ptool row now has ratio buttons + player + course */
#ptool{display:flex;align-items:center;gap:6px;padding:5px 10px;background:var(--s1);border-top:1px solid var(--bd);flex-shrink:0;flex-wrap:nowrap}
/* D: ratio block buttons */
#ratio-grp{display:flex;gap:3px;flex-shrink:0}
.ratio-btn{height:30px;padding:0 8px;border-radius:5px;border:1px solid var(--bd);background:var(--s2);color:var(--t2);font:700 11px/1 inherit;cursor:pointer;white-space:nowrap}
.ratio-btn.active{background:var(--mg);border-color:var(--mg);color:#fff}
/* E: player + course inputs */
#names-wrap{display:flex;align-items:center;gap:4px;flex:1;min-width:0}
#inp-player{width:180px;height:28px;font-size:12px;padding:3px 6px;flex-shrink:0}
#inp-course{width:80px;height:28px;font-size:12px;padding:3px 6px;flex-shrink:0;color:var(--t2)}
.ptool-sep{width:1px;height:20px;background:var(--bd);flex-shrink:0}

/* ── NAV ── */
#nav{background:var(--s1);border-top:1px solid var(--bd);flex-shrink:0;padding:5px 8px 3px}
#nav-rows{display:flex;flex-direction:column;gap:3px}
.nav-row{display:flex;gap:2px;align-items:center}
/* F: hole cards with better readability */
.hcard{flex:0 0 auto;width:52px;height:52px;border-radius:6px;border:2px solid transparent;cursor:pointer;display:flex;flex-direction:column;align-items:center;justify-content:center;user-select:none;position:relative;transition:transform .1s}
.hcard:active{transform:scale(.93)}
.hcard.active{border-color:var(--ghi)!important;box-shadow:0 0 0 1px var(--ghi)}
.hcard .hn{font-size:10px;font-weight:800;opacity:.85;margin-bottom:1px}
.hcard .hp{font-size:9px;font-weight:600;opacity:.7}
.hcard .hs{font-size:13px;font-weight:900}
.hcard.active::after{content:'';position:absolute;bottom:-7px;left:50%;transform:translateX(-50%);border-left:5px solid transparent;border-right:5px solid transparent;border-top:6px solid var(--ghi)}
/* A: color classes — +1 green */
.hc-purple{background:#7b2d9e;color:#fff}
.hc-red{background:#C0392B;color:#fff}
.hc-blue{background:#1a5bb5;color:#fff}
.hc-green{background:#2a7a2a;color:#fff}
.hc-g2{background:#2a2a2a;color:#fff}
.hc-g3{background:#111;color:#aaa}
.hc-empty{background:#1c2330;color:#4a6080;border:1px solid #2a3545!important}
/* stat cards */
.stat-card{flex:0 0 auto;width:48px;height:52px;border-radius:6px;background:#1a2233;border:1px solid #2a3545;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:1px;margin-left:3px;cursor:default;user-select:none}
.stat-card .sc-lbl{font-size:9px;font-weight:700;color:var(--gold)}
.stat-card .sc-par{font-size:9px;color:var(--t2)}
.stat-card .sc-num{font-size:12px;font-weight:800;color:var(--t1)}
/* F: nav footer — mode buttons moved right */
#nav-footer{display:flex;align-items:center;justify-content:flex-end;gap:5px;margin-top:3px}
.mode-btn{padding:0 10px;border-radius:4px;border:1px solid var(--bd);background:transparent;color:var(--t2);font:700 11px/1 inherit;cursor:pointer;height:24px;display:flex;align-items:center}
.mode-btn.active{background:var(--mg);color:#fff;border-color:var(--mg)}
/* F: mode group two-line on right */
#mode-grp{display:flex;flex-direction:column;gap:2px;align-items:flex-end}

/* ── RIGHT PANEL ── */
#right{display:flex;flex-direction:column;overflow-y:auto;background:var(--s1)}
#right::-webkit-scrollbar{width:4px}
#right::-webkit-scrollbar-thumb{background:var(--bd)}
/* Hole hero */
#hole-banner{padding:10px 14px 6px;background:linear-gradient(135deg,#1a2e1a 0%,#0e1a0e 100%);border-bottom:1px solid #1e3a1e;flex-shrink:0}
#hole-hero{display:flex;align-items:baseline;gap:8px;margin-bottom:3px}
#hole-num-big{font-family:Impact,'Arial Black',sans-serif;font-size:34px;color:#fff;line-height:1;letter-spacing:1px}
#hole-par-big{font-size:14px;font-weight:700;color:var(--gold)}
#statusbar{font-size:10px;color:var(--t3);font-family:'Courier New',monospace;display:flex;gap:8px;align-items:center}
#ls-ok{color:#2ea043}
.sec{padding:9px 13px;border-bottom:1px solid var(--bd)}
.stitle{font-size:9px;font-weight:700;text-transform:uppercase;letter-spacing:1.5px;color:var(--t3);margin-bottom:7px}
/* par */
.par-grp{display:flex;gap:4px}
.par-btn{width:38px;height:34px;border-radius:5px;border:1px solid var(--bd);background:var(--s2);color:var(--t1);font:700 14px/1 inherit;cursor:pointer}
.par-btn.active{background:var(--mg);border-color:var(--mg);color:#fff}
/* dist row */
.dist-row{display:flex;align-items:center;gap:5px;flex-wrap:nowrap}
.dist-row label{display:flex;align-items:center;gap:4px;font-size:12px;color:var(--t2);cursor:pointer;white-space:nowrap;flex-shrink:0}
.dist-row input[type=checkbox]{width:14px;height:14px;accent-color:var(--mg);flex-shrink:0}
#inp-dist{width:64px;height:28px;flex-shrink:0;font-size:12px}
.dist-unit{font-size:10px;color:var(--t3);white-space:nowrap;flex-shrink:0}

/* ── FINAL SCORE — MAIN ENTRY ── */
#delta-section{padding:10px 13px;border-bottom:1px solid var(--bd);border-left:3px solid var(--mg)}
.fs-title{font-size:9px;font-weight:700;text-transform:uppercase;letter-spacing:1.5px;color:var(--mg);opacity:.8;margin-bottom:7px}
/* C: +/- buttons + score btn + clear + next hole */
#fs-row{display:flex;align-items:center;gap:6px}
.fs-adj{width:48px;height:60px;border-radius:8px;border:1px solid var(--bd);background:var(--s2);color:var(--t1);font:700 24px/1 inherit;cursor:pointer;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.fs-adj:active{background:var(--bd)}
#delta-val-btn{
  flex:1;height:60px;border-radius:10px;
  border:2px solid var(--mg);background:var(--s2);
  color:var(--t1);font:900 44px/1 inherit;
  cursor:pointer;display:flex;align-items:center;justify-content:center;flex-direction:column;gap:2px;
  transition:background .1s,border-color .1s;position:relative;
}
#delta-val-btn:active{background:var(--bd)}
#delta-val-btn.unfilled{border-style:dashed;color:var(--mg)}
#delta-main-txt{font:900 44px/1 inherit;line-height:1}
#delta-val-btn.unfilled #delta-main-txt{font-size:30px}
#delta-sub-txt{font-size:11px;font-weight:500;color:var(--t2);opacity:.7;line-height:1}
/* clear hole moved into popover */
/* D: next hole NEXT to + btn */
#btn-next-hole{height:60px;padding:0 10px;border-radius:7px;border:1px solid var(--mg);background:rgba(27,94,59,.15);color:#6fcf97;font:700 11px/1.2 inherit;cursor:pointer;flex-shrink:0;display:flex;flex-direction:column;align-items:center;justify-content:center;text-align:center;white-space:nowrap}
#btn-next-hole:active{background:rgba(27,94,59,.3)}
#gross-disp{font-size:10px;color:var(--t3);margin-top:4px}

/* C: anchored popover */
#delta-popover{
  display:none;position:fixed;z-index:700;
  background:var(--s1);border:1px solid var(--bd);border-radius:12px;
  box-shadow:0 8px 32px rgba(0,0,0,.6);
  width:220px;
  overflow:hidden;
}
#delta-popover.show{display:block}
#delta-popover-header{display:flex;align-items:center;justify-content:space-between;padding:10px 14px 6px;border-bottom:1px solid var(--bd)}
#delta-popover-header h3{font-size:13px;font-weight:700}
#dpop-close{background:none;border:none;color:var(--t2);font-size:20px;cursor:pointer;line-height:1;padding:0 4px}
#delta-popover-scroll{height:200px;overflow-y:auto;scroll-snap-type:y mandatory;scrollbar-width:none}
#delta-popover-scroll::-webkit-scrollbar{display:none}
.pop-item{height:44px;display:flex;align-items:center;justify-content:center;font-size:17px;font-weight:700;cursor:pointer;scroll-snap-align:start;color:var(--t2);border-radius:6px;margin:1px 8px;transition:background .1s}
.pop-item:active{opacity:.7}
.pop-item.p-purple{background:#7b2d9e;color:#fff}
.pop-item.p-red{background:#C0392B;color:#fff}
.pop-item.p-blue{background:#1a5bb5;color:#fff}
.pop-item.p-green{background:#2a7a2a;color:#fff}
.pop-item.p-g2{background:#2a2a2a;color:#fff}
.pop-item.p-g3{background:#111;color:#aaa}
#dpop-backdrop{display:none;position:fixed;inset:0;z-index:699}
#dpop-backdrop.show{display:block}

/* shot nav */
.shot-nav{display:flex;align-items:center;gap:5px;margin-bottom:7px}
.shot-nav-btn{flex:1;height:46px;border-radius:7px;border:1px solid var(--bd);background:var(--s2);color:var(--t1);font:700 12px/1 inherit;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:3px}
.shot-nav-btn:active{background:var(--bd)}
.shot-nav-btn:disabled{opacity:.28;cursor:not-allowed}
.shot-info-box{flex:1;text-align:center;font-family:'Courier New',monospace;font-size:14px;color:var(--gold);font-weight:700}
.type-row{display:flex;gap:3px;flex-wrap:wrap;margin-bottom:4px}
.tbtn{padding:5px 8px;border-radius:5px;border:1px solid var(--bd);background:var(--s2);color:var(--t2);font:700 11px/1 inherit;cursor:pointer;min-height:32px;white-space:nowrap}
.tbtn.active{background:var(--mg);color:#fff;border-color:var(--mg)}
.auto-badge{font-size:9px;padding:1px 5px;border-radius:3px;background:#2a3a2a;color:#5c8c5c;border:1px solid #3a5a3a;margin-left:4px;vertical-align:middle}

/* J: Create Overlay block — above Display Options */
#export-sec{padding:9px 13px;border-bottom:1px solid var(--bd);background:rgba(27,94,59,.06)}
#export-sec .stitle{color:var(--mg);opacity:.9}
/* J: resolution block btns */
#res-grp{display:flex;gap:4px;margin-bottom:8px}
.res-btn{flex:1;height:32px;border-radius:5px;border:1px solid var(--bd);background:var(--s2);color:var(--t2);font:700 11px/1 inherit;cursor:pointer}
.res-btn.active{background:var(--mg);border-color:var(--mg);color:#fff}
/* J: overlay opacity slider */
.ov-opacity-row{display:flex;align-items:center;gap:6px;margin-bottom:8px;font-size:11px;color:var(--t2)}
.ov-opacity-row input[type=range]{flex:1;accent-color:var(--mg)}
.ov-opacity-row span{width:30px;text-align:right;flex-shrink:0}
.exp-btn-wrap{position:relative;flex-shrink:0;margin-bottom:0}
#btn-export{width:100%;height:38px;border-radius:7px;border:none;background:var(--mg);color:#fff;font:700 13px/1 inherit;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:6px}
#btn-export:active{background:#237a4d}
#exp-status{position:absolute;right:8px;top:50%;transform:translateY(-50%);width:18px;height:18px;border-radius:50%;font-size:11px;font-weight:800;display:flex;align-items:center;justify-content:center;opacity:0;transition:opacity .2s;pointer-events:none}
#exp-status.ok{background:#1a5e1a;color:#6f6;opacity:1}
#exp-status.err{background:#5e1a1a;color:#f88;opacity:1}

/* J: Display Options unified style */
.sec{padding:9px 13px;border-bottom:1px solid var(--bd)}
.opt-row{display:flex;align-items:center;gap:7px;margin-bottom:6px;font-size:12px}
.opt-row input[type=checkbox]{accent-color:var(--mg);width:14px;height:14px}
.opt-sub{margin-left:21px;display:flex;gap:6px;flex-wrap:wrap;margin-top:2px;font-size:11px}
.opt-sub label{display:flex;align-items:center;gap:4px;cursor:pointer}

/* ── SETTINGS DRAWER ── */
#sd-overlay{display:none;position:fixed;inset:0;z-index:399;background:rgba(0,0,0,.5)}
#sd-overlay.show{display:block}
#settings-drawer{position:fixed;top:0;right:0;width:290px;height:100%;background:var(--s1);border-left:1px solid var(--bd);z-index:400;transform:translateX(100%);transition:transform .25s;display:flex;flex-direction:column}
#settings-drawer.open{transform:translateX(0)}
#sdh{display:flex;align-items:center;justify-content:space-between;padding:12px 14px;border-bottom:1px solid var(--bd);flex-shrink:0}
#sdh h2{font-size:14px;font-weight:700}
#sd-close{background:none;border:none;color:var(--t2);font-size:22px;cursor:pointer;line-height:1;padding:2px 6px}
#sd-body{overflow-y:auto;flex:1;padding:12px}
.sd-sec{margin-bottom:14px}
.sd-sec-title{font-size:9px;font-weight:700;text-transform:uppercase;letter-spacing:1.5px;color:var(--t3);margin-bottom:7px}
.sd-row{display:flex;align-items:center;gap:8px;margin-bottom:6px;font-size:12px;color:var(--t2)}
.sd-row label{flex:1;cursor:pointer}
input[type=range]{accent-color:var(--mg)}
.sd-btn{width:100%;height:34px;border-radius:5px;border:1px solid var(--bd);background:var(--s2);color:var(--t1);font:600 12px/1 inherit;cursor:pointer;margin-bottom:5px}
.sd-btn:active{background:var(--bd)}

/* ── NEW ROUND MODAL ── */
#newround-modal{display:none;position:fixed;inset:0;z-index:600;background:rgba(0,0,0,.72);align-items:center;justify-content:center}
#newround-modal.show{display:flex}
.modal-box{background:var(--s1);border:1px solid var(--bd);border-radius:12px;padding:20px;min-width:270px;max-width:360px;width:90%}
.modal-box h3{margin-bottom:12px;font-size:15px}
.modal-box .opt-row{font-size:13px;margin-bottom:7px}
.modal-actions{display:flex;gap:8px;justify-content:flex-end;margin-top:14px}
.mbtn{height:36px;padding:0 14px;border-radius:6px;border:1px solid var(--bd);background:var(--s2);color:var(--t1);font:600 12px/1 inherit;cursor:pointer}
.mbtn.prim{background:var(--mg);border-color:var(--mg);color:#fff}

/* ── MINI TOAST ── */
#mini-toast{position:fixed;bottom:16px;right:16px;background:rgba(20,30,20,.9);color:#cfc;padding:7px 14px;border-radius:6px;font-size:12px;opacity:0;transition:opacity .25s;pointer-events:none;z-index:9999;border:1px solid #2a4a2a}
#mini-toast.show{opacity:1}
#mini-toast.err-toast{background:rgba(40,10,10,.9);color:#faa;border-color:#4a1a1a}

@media(max-width:768px){
  #main{grid-template-columns:1fr;grid-template-rows:auto 1fr}
  #left{height:50vw;min-height:180px}
  #right{overflow-y:auto}
}
</style>
</head>
<body>

<!-- HEADER -->
<div id="hdr">
  <div class="logo">⛳ GOLF <span>OVERLAY</span></div>
  <span class="logo-meta">v4.4<br><a href="/cdn-cgi/l/email-protection" class="__cf_email__" data-cfemail="e6959c9687858da69797c885898b">[email&#160;protected]</a></span>
  <span class="sp"></span>
  <!-- M: flag icons + language -->
  <div id="lang-toggle">
    <button class="lang-btn active" data-lang="en" onclick="setLang('en')">🇺🇸 EN</button>
    <button class="lang-btn" data-lang="zh" onclick="setLang('zh')">🇨🇳 中文</button>
  </div>
  <!-- M: settings with icon+text -->
  <button id="btn-settings" onclick="openSettings()">⚙️ <span id="settings-lbl">Settings</span></button>
  <button id="btn-new" onclick="openNewRound()">New…</button>
</div>

<!-- MAIN -->
<div id="main">
  <div id="left">
    <!-- Preview -->
    <div id="preview">
      <img id="bg-img" style="display:none;opacity:.45">
      <input type="file" id="bg-file-cover" accept="image/*">
      <canvas id="cv"></canvas>
      <div id="upload-hint">
        <div class="uh-box">
          <div class="ic">🖼</div>
          <div id="hint-main">Click to upload background</div>
          <div id="hint-sub" style="font-size:10px;color:var(--t3)">Preview only — not in export</div>
        </div>
      </div>
    </div>

    <!-- D: ptool: ratio btns + player + course -->
    <div id="ptool">
      <div id="ratio-grp">
        <button class="ratio-btn active" data-ratio="16:9" onclick="setRatio('16:9')">16:9</button>
        <button class="ratio-btn" data-ratio="9:16" onclick="setRatio('9:16')">9:16</button>
        <button class="ratio-btn" data-ratio="1:1" onclick="setRatio('1:1')">1:1</button>
      </div>
      <div class="ptool-sep"></div>
      <div id="names-wrap">
        <span style="font-size:10px;color:var(--t2);white-space:nowrap">🏌️</span>
        <input type="text" id="inp-player" placeholder="PLAYER" maxlength="18">
        <input type="text" id="inp-course" placeholder="COURSE" maxlength="20" style="color:var(--t2)">
      </div>
    </div>

    <!-- Scorecard Nav -->
    <div id="nav">
      <div id="nav-rows">
        <div class="nav-row" id="nav-row1"></div>
        <div class="nav-row" id="nav-row2"></div>
      </div>
      <div id="nav-footer">
        <!-- F: mode group on right, two-row -->
        <div id="mode-grp">
          <button class="mode-btn active" id="mode-tp" onclick="setMode('topar')">To Par</button>
          <button class="mode-btn" id="mode-gr" onclick="setMode('gross')">Gross</button>
        </div>
      </div>
    </div>
  </div>

  <!-- RIGHT PANEL -->
  <div id="right">
    <!-- Hole hero -->
    <div id="hole-banner">
      <div id="hole-hero">
        <span id="hole-num-big">HOLE 1</span>
        <span id="hole-par-big">PAR 4</span>
      </div>
      <div id="statusbar">
        <span id="ls-ok">LS✓</span>
        <span id="status-txt">Ready</span>
      </div>
    </div>

    <!-- Par + Dist -->
    <div class="sec">
      <div style="display:flex;align-items:center;gap:8px;margin-bottom:8px">
        <span style="font-size:11px;color:var(--t2);min-width:22px" id="par-lbl">Par</span>
        <div class="par-grp">
          <button class="par-btn" id="par3" onclick="setPar(3)">3</button>
          <button class="par-btn" id="par4" onclick="setPar(4)">4</button>
          <button class="par-btn" id="par5" onclick="setPar(5)">5</button>

const DEFAULT_BG='./bkimg.jpeg';
const LS_KEY='golf_v44';

function defState(){
  return{
    playerName:'PLAYER', courseName:'', currentHole:0, displayMode:'topar',
    ratio:'16:9', showShot:true, showScore:false, scoreRange:'18',
    showTotal:false, showDist:false,
    exportRes:'2160', overlayOpacity:1.0,
    bgOpacity:0.45, safeZone:false, szSize:'10', lang:'en',
    userBg:null,
    overlayPos:{
      '16:9':{x:0.73,y:0.05},
      '9:16':{x:0.04,y:0.05},
      '1:1': {x:0.60,y:0.05}
    },
    scorecardPos:{
      '16:9':{x:0.10,y:0.76},
      '9:16':{x:0.05,y:0.76},
      '1:1': {x:0.08,y:0.76}
    },
    // G: holes now store per-shot distances: shotDistances[idx]=number|null
    holes:Array.from({length:18},()=>({
      par:4, delta:null, shots:[], shotIndex:0, manualTypes:{}, shotDistances:{}
    }))
  };
}

let S=defState();
let saveTimer;
function scheduleSave(){ clearTimeout(saveTimer); saveTimer=setTimeout(doSave,350); }
function doSave(){
  try{
    const fs={...S,userBg:null};
    localStorage.setItem(LS_KEY,JSON.stringify(fs));
    if(S.userBg){ try{localStorage.setItem(LS_KEY+'_bg',S.userBg);}catch(e){} }
    else { localStorage.removeItem(LS_KEY+'_bg'); }
    document.getElementById('ls-ok').textContent='LS✓';
    document.getElementById('ls-ok').style.color='#2ea043';
  }catch(e){
    document.getElementById('ls-ok').textContent='LS✗';
    document.getElementById('ls-ok').style.color='#f88';
  }
}
function loadSaved(){
  try{
    const raw=localStorage.getItem(LS_KEY);
    if(!raw) return;
    const saved=JSON.parse(raw);
    S=Object.assign(defState(),saved);
    if(!S.overlayPos||typeof S.overlayPos['16:9']!=='object') S.overlayPos=defState().overlayPos;
    if(!S.scorecardPos||typeof S.scorecardPos['16:9']!=='object') S.scorecardPos=defState().scorecardPos;
    S.holes=Array.from({length:18},(_,i)=>Object.assign(
      {par:4,delta:null,shots:[],shotIndex:0,manualTypes:{},shotDistances:{}},
      saved.holes?.[i]||{}
    ));
    LANG=S.lang||'en';
    const bgData=localStorage.getItem(LS_KEY+'_bg');
    S.userBg=bgData||null;
  }catch(e){console.warn('loadSaved error',e);}
}

    hint.classList.add('hidden');

}
function setBgFile(file){
  if(!file||!file.type.startsWith('image/')) return;
  const r=new FileReader();
  r.onload=ev=>{ S.userBg=ev.target.result; applyBg(); scheduleSave(); };
  r.readAsDataURL(file);
}

// ============================================================
// HELPERS
// ============================================================
function curHole(){ return S.holes[S.currentHole]; }
function getGross(h){ return h.delta===null?null:h.par+h.delta; }
function totalDelta(){ return S.holes.reduce((a,h)=>a+(h.delta??0),0); }
function totalGross(){ return S.holes.reduce((a,h)=>a+h.par+(h.delta??0),0); }

// G: per-shot distance
function getShotDist(h,idx){
  return (h.shotDistances&&h.shotDistances[idx]!=null)?h.shotDistances[idx]:null;
}
function setShotDist(h,idx,val){
  if(!h.shotDistances) h.shotDistances={};
  if(val===null||val===undefined) delete h.shotDistances[idx];
  else h.shotDistances[idx]=val;
}

function shotTypeLabel(t){
  const map={
    TEE:T('toeOff'),APPR:T('approach'),CHIP:T('chip'),PUTT:T('putt'),
    FOR_BIRDIE:T('forBirdie'),FOR_PAR:T('forPar'),FOR_BOGEY:T('forBogey'),
    FOR_DOUBLE:T('forDouble'),FOR_TRIPLE:T('forTriple')
  };
  return (map[t]||t||'').toUpperCase();
}
function autoType(h,idx){
  const gross=getGross(h);
  if(!gross) return 'TEE';
  if(idx===0) return 'TEE';
  if(idx===gross-1){
    if(h.delta<=-1) return 'FOR_BIRDIE';
    if(h.delta===0) return 'FOR_PAR';
    if(h.delta===1) return 'FOR_BOGEY';
    if(h.delta===2) return 'FOR_DOUBLE';
    return 'FOR_TRIPLE';
  }
  if(idx===1&&h.par>=4) return 'APPR';
  return 'CHIP';
}

function totalBadgeColor(){
  const td=totalDelta(), tg=totalGross();
  if(td<=-2) return '#7b2d9e';
  if(td<0) return '#C0392B';
  if(tg>=70&&tg<80) return '#1a5bb5';
  if(tg>=80&&tg<90) return '#1B5E3B';
  if(tg>=90&&tg<100) return '#8a7200';
  return '#333';
}

function miniToast(msg,isErr){
  const t=document.getElementById('mini-toast');
  t.textContent=msg; t.classList.remove('err-toast');
  if(isErr) t.classList.add('err-toast');
  t.classList.add('show'); clearTimeout(t._timer);
  t._timer=setTimeout(()=>t.classList.remove('show'),isErr?2500:1800);
}

// ============================================================
function setPar(v){ curHole().par=v; reconcileShots(curHole()); render(); scheduleSave(); }
function setDelta(d){
  const h=curHole(); h.delta=d; h.manualTypes={};
  reconcileShots(h); h.shotIndex=0; render(); scheduleSave();
}
// C: +/- adjust delta
function adjustDelta(dir){
  const h=curHole();
  if(h.delta===null){
    // First tap: just set to 0 (par), do NOT also apply dir
    h.delta=0; h.manualTypes={}; reconcileShots(h); h.shotIndex=0;
    render(); scheduleSave(); return;
  }
  const nd=Math.max(-3,Math.min(10,h.delta+dir));
  h.delta=nd; h.manualTypes={}; reconcileShots(h);
  const gross=getGross(h);
  if(gross&&h.shotIndex<gross-1) h.shotIndex=gross-1;
  render(); scheduleSave();
}
function reconcileShots(h){
  const gross=getGross(h);
  if(gross===null){ h.shots=[]; h.shotIndex=0; return; }
  while(h.shots.length>gross) h.shots.pop();
  while(h.shots.length<gross) h.shots.push({type:null});
  if(h.shotIndex>=gross) h.shotIndex=gross-1;
  if(h.shotIndex<0) h.shotIndex=0;
  h.shots.forEach((s,i)=>{ if(!s.type) s.type=autoType(h,i); });
}
function clearHole(){
  const h=curHole(); h.delta=null; h.shots=[]; h.shotIndex=0; h.manualTypes={}; h.shotDistances={};
  render(); scheduleSave();
}
function setMode(m){ S.displayMode=m; render(); scheduleSave(); }
function prevShot(){
  const h=curHole(); if(h.delta===null||h.shotIndex<=0) return;
  h.shotIndex--; render(); scheduleSave();
}
function nextShot(){
  const h=curHole(); const g=getGross(h);
  if(!g||h.shotIndex>=g-1) return;
  h.shotIndex++; render(); scheduleSave();
}
function setShotType(type){
  const h=curHole(); if(h.delta===null) return;
  h.shots[h.shotIndex]={type}; h.manualTypes[h.shotIndex]=true; render(); scheduleSave();
}
function resetAllPars(){ S.holes.forEach(h=>h.par=4); render(); scheduleSave(); closeSettings(); }

// B: goto hole — jump to last shot if filled
function gotoHole(idx){
  S.currentHole=idx;
  const h=S.holes[idx];
  if(h.delta!==null){
    const gross=getGross(h);
    h.shotIndex=gross-1; // jump to last shot
  } else {
    h.shotIndex=0;
  }
  render(); scheduleSave();
}

function gotoNextHole(){
  for(let i=1;i<=18;i++){
    const idx=(S.currentHole+i)%18;
    if(S.holes[idx].delta===null){ gotoHole(idx); return; }
  }
  gotoHole((S.currentHole+1)%18);
}

function setRatio(r){
  S.ratio=r;
  document.querySelectorAll('.ratio-btn').forEach(b=>b.classList.toggle('active',b.dataset.ratio===r));
  render(); scheduleSave();
}
function setRes(r){
  S.exportRes=r;
  document.querySelectorAll('.res-btn').forEach(b=>b.classList.toggle('active',b.dataset.res===r));
  scheduleSave();
}

// ============================================================
// CANVAS ENGINE
// ============================================================
const SHOT_W=475, SHOT_H=128, ROW1=44, ROW2=42, ROW3=42, COL_W=143, RPAD=11;
let cvEl, dpr=1, cvCssW=0, cvCssH=0;
let dragging=null, dragStart={};
const SNAP_PX=12;

function getCanvasCssDims(){
  const area=document.getElementById('preview');
  const aw=area.clientWidth||800, ah=area.clientHeight||450;
  let cw,ch;
  if(S.ratio==='16:9'){ch=ah;cw=ah*(16/9);if(cw>aw){cw=aw;ch=aw*(9/16);}}
  else if(S.ratio==='9:16'){cw=aw;ch=aw*(16/9);if(ch>ah){ch=ah;cw=ah*(9/16);}}
  else{const s=Math.min(aw,ah);cw=s;ch=s;}
  return{w:Math.floor(cw),h:Math.floor(ch)};
}
function initCanvas(){
  cvEl=document.getElementById('cv'); dpr=window.devicePixelRatio||1;
  cvEl.addEventListener('mousedown',onDragStart);
  window.addEventListener('mousemove',onDragMove);
  window.addEventListener('mouseup',onDragEnd);
  cvEl.addEventListener('touchstart',onTouchStart,{passive:false});
  window.addEventListener('touchmove',onTouchMove,{passive:false});
  window.addEventListener('touchend',onDragEnd);
}
function evPt(e){
  if(e.touches&&e.touches.length) return{x:e.touches[0].clientX,y:e.touches[0].clientY};
  if(e.changedTouches&&e.changedTouches.length) return{x:e.changedTouches[0].clientX,y:e.changedTouches[0].clientY};
  return{x:e.clientX,y:e.clientY};
}
function snapPos(px,py,ow,oh){
  const sz=0.10;
  const sx=cvCssW*sz,sy=cvCssH*sz,ex=cvCssW*(1-sz),ey=cvCssH*(1-sz);
  // snap to safe zone edges
  if(Math.abs(px-sx)<SNAP_PX) px=sx;
  if(Math.abs(px+ow-ex)<SNAP_PX) px=ex-ow;
  if(Math.abs(py-sy)<SNAP_PX) py=sy;
  if(Math.abs(py+oh-ey)<SNAP_PX) py=ey-oh;
  // I: snap scorecard to horizontal center
  const centerX=(cvCssW-ow)/2;
  if(Math.abs(px-centerX)<SNAP_PX) px=centerX;
  return{x:Math.max(0,Math.min(cvCssW-1,px)),y:Math.max(0,Math.min(cvCssH-1,py))};
}

let wasDragging=false;
let clickWasOnBg=false; // true when mousedown was outside all overlays

function isOverAnyOverlay(mx,my,scale){
  if(S.showShot&&curHole().delta!==null){
    const pos=S.overlayPos[S.ratio];
    const ox=pos.x*cvCssW, oy=pos.y*cvCssH;
    if(mx>=ox&&mx<=ox+SHOT_W*scale&&my>=oy&&my<=oy+SHOT_H*scale) return true;
  }
  if(S.showScore){
    const pos=S.scorecardPos[S.ratio];
    const sx=pos.x*cvCssW, sy=pos.y*cvCssH;
    const sw=getSCWidth(scale),sh=getSCHeight(scale);
    if(mx>=sx&&mx<=sx+sw&&my>=sy&&my<=sy+sh) return true;
  }
  return false;
}

function onDragStart(e){
  const pt=evPt(e);
  const rect=cvEl.getBoundingClientRect();
  const mx=(pt.x-rect.left)/rect.width*cvCssW;
  const my=(pt.y-rect.top)/rect.height*cvCssH;
  const scale=cvCssW/1920;
  wasDragging=false;
  clickWasOnBg=false;
  if(S.showShot&&curHole().delta!==null){
    const pos=S.overlayPos[S.ratio];
    const ox=pos.x*cvCssW, oy=pos.y*cvCssH;
    if(mx>=ox&&mx<=ox+SHOT_W*scale&&my>=oy&&my<=oy+SHOT_H*scale){
      dragging='overlay'; dragStart={mx,my,ox,oy}; wasDragging=true; e.preventDefault(); return;
    }
  }
  if(S.showScore){
    const pos=S.scorecardPos[S.ratio];
    const sx=pos.x*cvCssW, sy=pos.y*cvCssH;
    const sw=getSCWidth(scale),sh=getSCHeight(scale);
    if(mx>=sx&&mx<=sx+sw&&my>=sy&&my<=sy+sh){
      dragging='scorecard'; dragStart={mx,my,ox:sx,oy:sy}; wasDragging=true; e.preventDefault(); return;
    }
  }
  // Click was on background area (not on any overlay)
  clickWasOnBg=true;
  dragStart._clickX=mx; dragStart._clickY=my;
}
function onDragMove(e){
  if(!dragging) return; e.preventDefault();
  wasDragging=true;
  const pt=evPt(e);
  const rect=cvEl.getBoundingClientRect();
  const mx=(pt.x-rect.left)/rect.width*cvCssW;
  const my=(pt.y-rect.top)/rect.height*cvCssH;
  const dx=mx-dragStart.mx, dy=my-dragStart.my;
  const scale=cvCssW/1920;
  if(dragging==='overlay'){
    const sn=snapPos(dragStart.ox+dx,dragStart.oy+dy,SHOT_W*scale,SHOT_H*scale);
    S.overlayPos[S.ratio]={x:sn.x/cvCssW,y:sn.y/cvCssH};
  } else {
    const sw=getSCWidth(scale),sh=getSCHeight(scale);
    const sn=snapPos(dragStart.ox+dx,dragStart.oy+dy,sw,sh);
    S.scorecardPos[S.ratio]={x:sn.x/cvCssW,y:sn.y/cvCssH};
  }
  redrawOnly(); scheduleSave();
}
function onDragEnd(e){
  const wasD=dragging;
  dragging=null;
  // K: only trigger bg upload if click was on canvas background (not overlay), no drag movement
  if(!wasD&&!wasDragging&&clickWasOnBg){
    document.getElementById('bg-file-cover').click();
  }
  wasDragging=false;
  clickWasOnBg=false;
}
function onTouchStart(e){ if(e.touches.length===1) onDragStart(e); }
function onTouchMove(e){ if(e.touches.length===1) onDragMove(e); }

// ── RENDER ──
function render(){
  dpr=window.devicePixelRatio||1;
  const dims=getCanvasCssDims();
  cvCssW=dims.w; cvCssH=dims.h;
  cvEl.width=Math.round(dims.w*dpr); cvEl.height=Math.round(dims.h*dpr);
  cvEl.style.width=dims.w+'px'; cvEl.style.height=dims.h+'px';
  const area=document.getElementById('preview');
  cvEl.style.left=((area.clientWidth-dims.w)/2)+'px';
  cvEl.style.top=((area.clientHeight-dims.h)/2)+'px';
  redrawOnly();
  buildHoleNav();
  buildDeltaBtn();
  buildTypeButtons();
  updateRightPanel();
}
function redrawOnly(){
  const ctx=cvEl.getContext('2d');
  ctx.setTransform(dpr,0,0,dpr,0,0);
  ctx.clearRect(0,0,cvCssW,cvCssH);
  drawOverlays(ctx,cvCssW,cvCssH,false);
}

// ── DRAW OVERLAYS ──
function drawOverlays(ctx,w,h,forExport){
  if(forExport&&S.exportRes) {/* bg not drawn */}
  if(S.safeZone) drawSafeZone(ctx,w,h);
  const scale=w/1920;
  const opa=S.overlayOpacity??1;
  ctx.save(); ctx.globalAlpha=opa;
  if(S.showShot&&curHole().delta!==null){
    const pos=S.overlayPos[S.ratio];
    drawShotOverlay(ctx,pos.x*w,pos.y*h,scale);
  }
  if(S.showScore){
    const pos=S.scorecardPos[S.ratio];
    drawScorecardOverlay(ctx,pos.x*w,pos.y*h,scale);
  }
  ctx.restore();
}

function drawSafeZone(ctx,w,h){
  ctx.save(); ctx.setLineDash([6,5]); ctx.lineWidth=1;
  if(S.szSize==='5'||S.szSize==='both'){const p=0.05;ctx.strokeStyle='rgba(255,220,0,.4)';ctx.strokeRect(w*p,h*p,w*(1-2*p),h*(1-2*p));}
  if(S.szSize==='10'||S.szSize==='both'){const p=0.10;ctx.strokeStyle='rgba(255,160,0,.45)';ctx.strokeRect(w*p,h*p,w*(1-2*p),h*(1-2*p));}
  ctx.restore();
}

// ── SHOT OVERLAY v4.4 ──
function drawShotOverlay(ctx,X,Y,scale){
  const h=curHole();
  const W=SHOT_W*scale, H=SHOT_H*scale;
  const r1=ROW1*scale, r2=ROW2*scale, r3=ROW3*scale;
  const colW=COL_W*scale, rO=4*scale, rpad=RPAD*scale;

  ctx.save();
  rrect(ctx,X,Y,W,H,rO); ctx.clip();

  // BG
  ctx.fillStyle='#1B5E3B'; ctx.fillRect(X,Y,colW,H);
  ctx.fillStyle='#F8F8F8'; ctx.fillRect(X+colW,Y,W-colW,H);
  ctx.fillStyle='#1B5E3B'; ctx.fillRect(X+colW,Y+r1,W-colW,r2);

  // H: left col — hole number + PAR, ensure not clipped
  // Hole number — shifted up from center
  ctx.fillStyle='#fff';
  ctx.font=`900 ${Math.round(50*scale)}px ${SF}`;
  ctx.textAlign='center'; ctx.textBaseline='alphabetic';
  ctx.fillText(String(S.currentHole+1),X+colW/2,Y+H*0.50);

  // PAR label
  ctx.fillStyle='rgba(255,255,255,0.6)';
  ctx.font=`700 ${Math.round(11*scale)}px ${SF}`;
  ctx.textBaseline='alphabetic';
  ctx.fillText('PAR',X+colW/2,Y+H-26*scale);

  // H: PAR number 28px — bold and visible
  ctx.fillStyle='#B8962E';
  ctx.font=`900 ${Math.round(28*scale)}px ${SF}`;
  ctx.fillText(String(h.par),X+colW/2,Y+H-5*scale);

  // ROW1: player name + total badge
  const rx=X+colW+rpad, rW=W-colW-2*rpad;
  let nameMaxW=rW, totalBadgeW=0;
  if(S.showTotal){ totalBadgeW=62*scale; nameMaxW=rW-totalBadgeW-8*scale; }
  ctx.fillStyle='#111';
  ctx.font=`700 ${Math.round(17*scale)}px ${SF}`;
  ctx.textAlign='left'; ctx.textBaseline='middle';
  let name=S.playerName.toUpperCase();
  while(ctx.measureText(name).width>nameMaxW&&name.length>1) name=name.slice(0,-1);
  if(name!==S.playerName.toUpperCase()) name=name.slice(0,-1)+'…';
  ctx.fillText(name,rx,Y+r1/2);
  if(S.showTotal){
    const td=totalDelta(), tg=totalGross();
    const bColor=totalBadgeColor();
    const bTxt=S.displayMode==='topar'?fmtDelta(td):String(tg);
    const bx=X+W-rpad-totalBadgeW, by=Y+5*scale, bh=r1-10*scale;
    rrect(ctx,bx,by,totalBadgeW,bh,2*scale); ctx.fillStyle=bColor; ctx.fill();
    ctx.fillStyle='#fff'; ctx.font=`700 ${Math.round(13*scale)}px ${SF}`;
    ctx.textAlign='center'; ctx.textBaseline='middle';
    ctx.fillText(bTxt,bx+totalBadgeW/2,by+bh/2);
  }

  // ROW2: progress squares RIGHT-ALIGNED
  const gross=getGross(h), si=h.shotIndex;
  const sqSz=22*scale, sqGap=4*scale;
  const totalSqW=gross*(sqSz+sqGap)-sqGap;
  const sqStartX=X+W-rpad-totalSqW;
  const sqCY=Y+r1+r2/2;
  for(let i=0;i<gross;i++){
    const bx=sqStartX+i*(sqSz+sqGap), by=sqCY-sqSz/2;
    const isCur=i===si, isPast=i<si;
    if(isCur){ rrect(ctx,bx,by,sqSz,sqSz,3*scale); ctx.fillStyle='#fff'; ctx.fill(); ctx.fillStyle='#1B5E3B'; }
    else if(isPast){ rrect(ctx,bx,by,sqSz,sqSz,3*scale); ctx.fillStyle='rgba(255,255,255,.25)'; ctx.fill(); ctx.fillStyle='rgba(255,255,255,.85)'; }
    else{ rrect(ctx,bx,by,sqSz,sqSz,3*scale); ctx.fillStyle='rgba(255,255,255,.10)'; ctx.fill(); ctx.fillStyle='rgba(255,255,255,.3)'; }
    ctx.font=`700 ${Math.round(11*scale)}px ${SF}`;
    ctx.textAlign='center'; ctx.textBaseline='middle';
    ctx.fillText(String(i+1),bx+sqSz/2,sqCY);
  }

  // Gold divider Row2-Row3
  const divY=Y+r1+r2;
  ctx.save(); ctx.setLineDash([]);
  ctx.strokeStyle='#B8962E';
  ctx.lineWidth=Math.max(1,Math.round(scale));
  ctx.beginPath(); ctx.moveTo(X+colW,divY); ctx.lineTo(X+W,divY); ctx.stroke();
  ctx.restore();

  // H: ROW3 — THREE SECTIONS: [LEFT: ToPin] [CENTER: shot type] [RIGHT: result badge]
  const r3y=divY;
  const r3Mid=r3y+r3/2;

  // Divide row3 into 3 zones
  const zoneW=(W-colW)/3;
  const z1x=X+colW; // left zone start
  const z2x=X+colW+zoneW; // center zone start
  const z3x=X+colW+zoneW*2; // right zone start

  // LEFT: To Pin
  if(S.showDist){
    const dist=getShotDist(h,si);
    const lbl=T('toPinLabel');
    const distStr=dist!==null?String(dist):'—';
    const unit=(dist!==null)?T('ydsLabel'):'';
    ctx.save();
    ctx.fillStyle='rgba(0,0,0,.5)';
    ctx.font=`500 ${Math.round(8.5*scale)}px ${SF}`;
    ctx.textAlign='left'; ctx.textBaseline='top';
    ctx.fillText(lbl,z1x+rpad,r3y+4*scale);
    ctx.fillStyle='#222';
    ctx.font=`700 ${Math.round(15*scale)}px ${SF}`;
    ctx.textBaseline='bottom';
    const dw=ctx.measureText(distStr).width;
    ctx.fillText(distStr,z1x+rpad,r3y+r3-4*scale);
    if(unit){
      ctx.fillStyle='rgba(0,0,0,.35)';
      ctx.font=`500 ${Math.round(8*scale)}px ${SF}`;
      ctx.fillText(unit,z1x+rpad+dw+2*scale,r3y+r3-4*scale);
    }
    ctx.restore();
  }

  // CENTER: shot type (white pill, black text)
  const isLast=si===gross-1;
  if(!isLast){
    const typeStr=shotTypeLabel(h.shots[si]?.type);
    if(typeStr){
      ctx.save();
      ctx.font=`600 ${Math.round(11*scale)}px ${SF}`;
      const tw=ctx.measureText(typeStr).width;
      const bW=Math.min(tw+14*scale,zoneW-4*scale), bH=20*scale;
      const bx=z2x+(zoneW-bW)/2, by=r3Mid-bH/2;
      rrect(ctx,bx,by,bW,bH,2*scale);
      ctx.fillStyle='rgba(255,255,255,0.92)'; ctx.fill();
      ctx.fillStyle='#222'; ctx.textAlign='center'; ctx.textBaseline='middle';
      ctx.fillText(typeStr,bx+bW/2,by+bH/2);
      ctx.restore();
    }
  }

  // RIGHT: result badge (always show delta label when delta is set)
  if(h.delta!==null){
    const resultStr=deltaLabel(h.delta);
    const bColor=deltaColorHex(h.delta);
    ctx.save();
    ctx.font=`700 ${Math.round(12*scale)}px ${SF}`;
    const tw=ctx.measureText(resultStr).width;
    const bW=Math.min(tw+14*scale,zoneW-rpad), bH=20*scale;
    const bx=X+W-rpad-bW, by=r3Mid-bH/2;
    rrect(ctx,bx,by,bW,bH,2*scale);
    ctx.strokeStyle=bColor; ctx.lineWidth=Math.max(1,scale); ctx.stroke();
    ctx.fillStyle=bColor; ctx.textAlign='center'; ctx.textBaseline='middle';
    ctx.fillText(resultStr,bx+bW/2,by+bH/2);
    ctx.restore();
  }

  // Row1 divider
  ctx.strokeStyle='rgba(200,200,200,.55)'; ctx.lineWidth=Math.max(.5,.5*scale);
  ctx.beginPath(); ctx.moveTo(X+colW,Y+r1); ctx.lineTo(X+W,Y+r1); ctx.stroke();
  ctx.restore();
}

// ── SCORECARD OVERLAY v4.4 — I: 25% larger, centered ──
function getSCRange(){ return S.scoreRange==='front9'?[0,9]:S.scoreRange==='back9'?[9,18]:[0,18]; }
function getSCWidth(scale){
  const[s,e]=getSCRange(); const count=e-s;
  // colW=52 (slight increase for readability at new height)
  return(68+count*52+72)*scale;
}
function getSCHeight(scale){ return 140*scale; } // was 108, +30% ≈ 140

function centerSC(){
  const scale=cvCssW/1920;
  const sw=getSCWidth(scale), sh=getSCHeight(scale);
  const cx=(cvCssW-sw)/2/cvCssW;
  // I: centered, slightly above bottom safe zone
  const cy=(cvCssH*0.78-sh/2)/cvCssH;
  S.scorecardPos[S.ratio]={x:Math.max(0,cx),y:Math.max(0,cy)};
}

function drawScorecardOverlay(ctx,X,Y,scale){
  const[start,end]=getSCRange(), count=end-start;
  const labelW=68*scale, colW=52*scale, totalW=72*scale;
  const hdrH=38*scale, rowH=51*scale;  // taller rows for 30% size increase
  const W=labelW+count*colW+totalW, H=hdrH+rowH*2;

  ctx.save();
  ctx.shadowColor='rgba(0,0,0,.28)'; ctx.shadowBlur=10*scale; ctx.shadowOffsetY=3*scale;
  rrect(ctx,X,Y,W,H,7*scale); ctx.fillStyle='#F2F2F2'; ctx.fill();
  ctx.shadowColor='transparent';
  rrect(ctx,X,Y,W,H,7*scale); ctx.clip();

  // Header: green
  ctx.fillStyle='#1B5E3B'; ctx.fillRect(X,Y,W,hdrH);
  ctx.fillStyle='rgba(255,255,255,.55)';
  ctx.font=`600 ${Math.round(13*scale)}px ${SF}`;
  ctx.textAlign='center'; ctx.textBaseline='middle';
  ctx.fillText('HOLE',X+labelW/2,Y+hdrH/2);
  for(let i=0;i<count;i++){
    const hi=start+i;
    ctx.fillStyle=hi===S.currentHole?'#B8962E':'rgba(255,255,255,.8)';
    ctx.font=`700 ${Math.round(14*scale)}px ${SF}`;
    ctx.fillText(String(hi+1),X+labelW+i*colW+colW/2,Y+hdrH/2);
  }
  ctx.fillStyle='rgba(255,255,255,.85)';
  ctx.font=`700 ${Math.round(13*scale)}px ${SF}`;
  ctx.fillText('TOT',X+W-totalW/2,Y+hdrH/2);

  // PAR row
  const parY=Y+hdrH;
  ctx.fillStyle='#EAF2EA'; ctx.fillRect(X,parY,W,rowH);
  ctx.strokeStyle='rgba(180,195,180,.4)'; ctx.lineWidth=0.5;
  for(let i=0;i<=count;i++){ const lx=X+labelW+i*colW; ctx.beginPath(); ctx.moveTo(lx,parY); ctx.lineTo(lx,parY+rowH); ctx.stroke(); }
  ctx.fillStyle='rgba(0,0,0,.4)'; ctx.font=`600 ${Math.round(13*scale)}px ${SF}`;
  ctx.textAlign='center'; ctx.textBaseline='middle';
  ctx.fillText('PAR',X+labelW/2,parY+rowH/2);
  let parTot=0;
  for(let i=0;i<count;i++){
    const h=S.holes[start+i]; parTot+=h.par;
    ctx.fillStyle='#2a5e2a'; ctx.font=`700 ${Math.round(17*scale)}px ${SF}`;
    ctx.fillText(String(h.par),X+labelW+i*colW+colW/2,parY+rowH/2);
  }
  ctx.fillStyle='#1B5E3B'; ctx.font=`800 ${Math.round(17*scale)}px ${SF}`;
  ctx.fillText(String(parTot),X+W-totalW/2,parY+rowH/2);

  // SCORE row
  const scY=parY+rowH;
  ctx.fillStyle='#FFFFFF'; ctx.fillRect(X,scY,W,rowH);
  ctx.strokeStyle='rgba(180,195,180,.5)';
  for(let i=0;i<=count;i++){ const lx=X+labelW+i*colW; ctx.beginPath(); ctx.moveTo(lx,scY); ctx.lineTo(lx,scY+rowH); ctx.stroke(); }
  ctx.strokeStyle='rgba(180,195,180,.5)'; ctx.lineWidth=0.5;
  ctx.beginPath(); ctx.moveTo(X,parY+rowH); ctx.lineTo(X+W,parY+rowH); ctx.stroke();
  ctx.fillStyle='rgba(0,0,0,.35)'; ctx.font=`600 ${Math.round(13*scale)}px ${SF}`;
  ctx.textAlign='center'; ctx.textBaseline='middle';
  ctx.fillText('SCORE',X+labelW/2,scY+rowH/2);
  for(let i=0;i<count;i++){
    const h=S.holes[start+i], cx=X+labelW+i*colW+colW/2;
    if(h.delta===null){
      ctx.fillStyle='rgba(0,0,0,.18)'; ctx.font=`400 ${Math.round(14*scale)}px ${SF}`;
      ctx.fillText('—',cx,scY+rowH/2);
    } else {
      const bW=36*scale, bH=28*scale;
      rrect(ctx,cx-bW/2,scY+rowH/2-bH/2,bW,bH,4*scale);
      ctx.fillStyle=deltaColorHex(h.delta); ctx.fill();
      ctx.fillStyle='#fff'; ctx.font=`700 ${Math.round(14*scale)}px ${SF}`;
      const txt=S.displayMode==='topar'?fmtDelta(h.delta):String(h.par+h.delta);
      ctx.fillText(txt,cx,scY+rowH/2);
    }
  }
  const td=S.holes.slice(start,end).reduce((a,h)=>a+(h.delta??0),0);
  const tg=S.holes.slice(start,end).reduce((a,h)=>a+h.par+(h.delta??0),0);
  ctx.fillStyle='#111'; ctx.font=`800 ${Math.round(18*scale)}px ${SF}`;
  ctx.fillText(S.displayMode==='topar'?fmtDelta(td):String(tg),X+W-totalW/2,scY+rowH/2);

  // Outer border
  ctx.strokeStyle='rgba(27,94,59,.25)'; ctx.lineWidth=1;
  rrect(ctx,X,Y,W,H,7*scale); ctx.stroke();
  ctx.restore();
}

function rrect(ctx,x,y,w,h,r){
  r=Math.min(r,w/2,h/2);
  ctx.beginPath();
  ctx.moveTo(x+r,y); ctx.lineTo(x+w-r,y); ctx.arcTo(x+w,y,x+w,y+r,r);
  ctx.lineTo(x+w,y+h-r); ctx.arcTo(x+w,y+h,x+w-r,y+h,r);
  ctx.lineTo(x+r,y+h); ctx.arcTo(x,y+h,x,y+h-r,r);
  ctx.lineTo(x,y+r); ctx.arcTo(x,y,x+r,y,r);
  ctx.closePath();
}

// EXPORT

function doExport(){
  const res=parseInt(S.exportRes)||2160;
  let expW,expH;
  if(S.ratio==='16:9'){expW=Math.round(res*16/9);expH=res;}
  else if(S.ratio==='9:16'){expW=Math.round(res*9/16);expH=res;}
  else{expW=res;expH=res;}
  let offscreen;
  try{ offscreen=document.createElement('canvas'); offscreen.width=expW; offscreen.height=expH; }
  catch(err){ showExpStatus(false); return; }
  const ctx=offscreen.getContext('2d');
  drawOverlays(ctx,expW,expH,true);
  const h=curHole();
  const stype=(h.shots[h.shotIndex]?.type||'shot').toLowerCase().replace(/_/g,'-');
  const fname=`hole${String(S.currentHole+1).padStart(2,'0')}_shot${String(h.shotIndex+1).padStart(2,'0')}_${stype}_${res}p.png`;
  try{
    offscreen.toBlob(blob=>{
      if(!blob){ showExpStatus(false,'toBlob null'); return; }
      const url=URL.createObjectURL(blob);
      const a=document.createElement('a'); a.href=url; a.download=fname;
      document.body.appendChild(a); a.click(); document.body.removeChild(a);
      setTimeout(()=>URL.revokeObjectURL(url),4000);
      showExpStatus(true);
    },'image/png');
  }catch(err){
    try{
      const url=offscreen.toDataURL('image/png');
      const a=document.createElement('a'); a.href=url; a.download=fname;
      document.body.appendChild(a); a.click(); document.body.removeChild(a);
      showExpStatus(true);
    }catch(e2){ showExpStatus(false,e2.message); console.error(e2); }
  }
}
function showExpStatus(ok,msg){
  const el=document.getElementById('exp-status');
  el.className=''; el.textContent=ok?'✓':'!';
  el.classList.add(ok?'ok':'err');
  clearTimeout(el._t); el._t=setTimeout(()=>el.className='',ok?1000:2000);
  if(!ok&&msg) console.error('Export fail:',msg);
}

function openPopover(evt){
  buildPopoverItems();
  const pop=document.getElementById('delta-popover');
  pop.classList.add('show');
  document.getElementById('dpop-backdrop').classList.add('show');
  // Position anchored below the button
  const btn=document.getElementById('delta-val-btn');
  const rect=btn.getBoundingClientRect();
  const popW=220, popH=280;
  let left=rect.left+(rect.width-popW)/2;
  let top=rect.bottom+6;
  // Keep on screen
  if(left<8) left=8;
  if(left+popW>window.innerWidth-8) left=window.innerWidth-popW-8;
  if(top+popH>window.innerHeight-8) top=rect.top-popH-6;
  pop.style.left=left+'px'; pop.style.top=top+'px';
}
function closePopover(){
  document.getElementById('delta-popover').classList.remove('show');
  document.getElementById('dpop-backdrop').classList.remove('show');

// ============================================================
function setupLongPress(btn,fn){
  let t=null;
  const start=()=>{ fn(); t=setInterval(fn,200); };
  const stop=()=>{ clearInterval(t);t=null; };
  btn.addEventListener('mousedown',start);
  btn.addEventListener('touchstart',e=>{e.preventDefault();start();},{passive:false});
  btn.addEventListener('mouseup',stop); btn.addEventListener('mouseleave',stop); btn.addEventListener('touchend',stop);
}

// WIRING
// ============================================================
function wireAll(){
  document.getElementById('btn-export').onclick=doExport;
  // K: bg file cover
  const bgCover=document.getElementById('bg-file-cover');
  bgCover.addEventListener('change',e=>{ setBgFile(e.target.files[0]); e.target.value=''; });
  const pv=document.getElementById('preview');
  pv.addEventListener('dragover',e=>e.preventDefault());
  pv.addEventListener('drop',e=>{ e.preventDefault(); setBgFile(e.dataTransfer.files[0]); });

  // Settings
  document.getElementById('sd-clear-bg').onclick=clearBg;
  document.getElementById('bg-opacity').oninput=e=>{
    const v=parseInt(e.target.value)/100; S.bgOpacity=v;
    document.getElementById('bg-opacity-val').textContent=e.target.value+'%';
    const img=document.getElementById('bg-img'); if(img.src) img.style.opacity=v;
    scheduleSave();
  };
  document.getElementById('chk-sz').onchange=e=>{ S.safeZone=e.target.checked; redrawOnly(); scheduleSave(); };
  document.getElementById('sz-size').onchange=e=>{ S.szSize=e.target.value; redrawOnly(); scheduleSave(); };

  // Player / course
  document.getElementById('inp-player').oninput=e=>{ S.playerName=e.target.value||'PLAYER'; redrawOnly(); scheduleSave(); };
  document.getElementById('inp-course').oninput=e=>{ S.courseName=e.target.value||''; scheduleSave(); };

  // G: To Pin per shot — on focus select all
  const distInput=document.getElementById('inp-dist');
  distInput.oninput=e=>{
    const h=curHole(); const v=parseInt(e.target.value)||null;
    setShotDist(h,h.shotIndex,v);
    redrawOnly(); scheduleSave();
  };
  distInput.onfocus=()=>distInput.select();
  document.getElementById('chk-dist').onchange=e=>{ S.showDist=e.target.checked; redrawOnly(); scheduleSave(); };
  document.getElementById('chk-total').onchange=e=>{ S.showTotal=e.target.checked; redrawOnly(); scheduleSave(); };

  // Overlays
  document.getElementById('chk-shot').onchange=e=>{ S.showShot=e.target.checked; redrawOnly(); scheduleSave(); };
  document.getElementById('chk-score').onchange=e=>{
    S.showScore=e.target.checked;
    document.getElementById('score-sub').style.display=e.target.checked?'flex':'none';
    if(e.target.checked) centerSC(); // I: auto-center when enabled
    redrawOnly(); scheduleSave();
  };
  document.querySelectorAll('[name=scr]').forEach(r=>r.onchange=()=>{
    S.scoreRange=r.value;
    centerSC(); // I: auto-center on range switch
    redrawOnly(); scheduleSave();
  });

  // J: overlay opacity
  document.getElementById('ov-opacity').oninput=e=>{
    const v=parseInt(e.target.value)/100; S.overlayOpacity=v;
    document.getElementById('ov-opacity-val').textContent=e.target.value+'%';
    redrawOnly(); scheduleSave();
  };

  // Mode
  document.getElementById('mode-tp').onclick=()=>setMode('topar');
  document.getElementById('mode-gr').onclick=()=>setMode('gross');

  // Shot nav
  setupLongPress(document.getElementById('btn-prev'),prevShot);
  setupLongPress(document.getElementById('btn-next'),nextShot);

  // After prevShot/nextShot, update to-pin input
  document.getElementById('btn-prev').addEventListener('click',updateDistInput);
  document.getElementById('btn-next').addEventListener('click',updateDistInput);

  // Next hole
  document.getElementById('btn-next-hole').onclick=gotoNextHole;

  // Par
  [3,4,5].forEach(p=>document.getElementById('par'+p).onclick=()=>setPar(p));

  // Modals
  document.getElementById('newround-modal').onclick=e=>{ if(e.target===document.getElementById('newround-modal')) closeNewRound(); };
  document.getElementById('delta-popover'); // already in DOM

  // Keyboard
  window.addEventListener('keydown',e=>{
    if(e.target.tagName==='INPUT'||e.target.tagName==='TEXTAREA') return;
    if(e.key==='ArrowRight'||e.key==='.') nextShot();
    else if(e.key==='ArrowLeft'||e.key===',') prevShot();
    else if(e.key.toLowerCase()==='h') gotoNextHole();
  });
  window.addEventListener('resize',()=>render());
}

function updateDistInput(){
  const h=curHole();
  const dist=getShotDist(h,h.shotIndex);
  const inp=document.getElementById('inp-dist');
  inp.value=dist!==null&&dist!==undefined?dist:'';
}
