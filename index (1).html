<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Golf Overlay Tool v4.1</title>
<style>
:root {
  --mg: #1B5E3B;
  --gold: #B8962E;
  --bg: #0d1117;
  --s1: #161b22;
  --s2: #21262d;
  --bd: #30363d;
  --t1: #e6edf3;
  --t2: #8b949e;
  --t3: #484f58;
  --red: #C0392B;
  --blue: #1a5bb5;
  --green-hi: #00e676;
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html,body{height:100%;overflow:hidden}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',system-ui,sans-serif;background:var(--bg);color:var(--t1);display:flex;flex-direction:column}

/* ── HEADER ── */
#hdr{display:flex;align-items:center;gap:10px;padding:8px 14px;background:var(--s1);border-bottom:1px solid var(--bd);flex-shrink:0;flex-wrap:wrap}
.logo{font-family:Impact,'Arial Black',sans-serif;font-size:18px;letter-spacing:1px;color:var(--gold);white-space:nowrap}
.logo span{color:#fff}
#hdr .sp{flex:1 1 0}
.hbtn{height:34px;padding:0 12px;border-radius:6px;border:1px solid var(--bd);background:var(--s2);color:var(--t1);font:600 12px/1 inherit;cursor:pointer;white-space:nowrap;display:inline-flex;align-items:center;gap:5px}
.hbtn:active{background:var(--bd)}
.hbtn.prim{background:var(--mg);border-color:var(--mg);color:#fff}
.hbtn.prim:active{background:#237a4d}
.hbtn.warn{background:#3d1515;border-color:#7d1a1a;color:#f88}
select,input[type=text],input[type=number]{background:var(--s2);border:1px solid var(--bd);color:var(--t1);border-radius:6px;padding:5px 9px;font:13px/1 inherit;outline:none;height:34px}
select:focus,input:focus{border-color:#2ea043}

/* ── MAIN GRID ── */
#main{display:grid;grid-template-columns:1fr 330px;flex:1;overflow:hidden}

/* ── LEFT PANEL ── */
#left{display:flex;flex-direction:column;overflow:hidden;border-right:1px solid var(--bd)}
#preview{flex:1;position:relative;overflow:hidden;background:#000;cursor:default}
#bg-img{position:absolute;inset:0;width:100%;height:100%;object-fit:contain;pointer-events:none}
#cv{position:absolute;cursor:move;image-rendering:auto}
/* upload hint */
#upload-hint{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:8px;color:var(--t3);font-size:13px;cursor:pointer;border:2px dashed var(--bd);margin:16px;border-radius:8px;transition:border-color .2s}
#upload-hint:hover{border-color:var(--t2);color:var(--t2)}
#upload-hint .ic{font-size:32px}
#upload-hint.hidden{display:none}
#change-bg-btn{position:absolute;top:8px;left:8px;background:rgba(0,0,0,.6);border:1px solid rgba(255,255,255,.2);color:#fff;padding:4px 10px;border-radius:4px;font-size:11px;cursor:pointer;display:none}
#change-bg-btn.show{display:block}
#bg-file{display:none}

/* toolbar below preview */
#ptool{display:flex;align-items:center;gap:8px;padding:6px 12px;background:var(--s1);border-top:1px solid var(--bd);flex-shrink:0;flex-wrap:wrap}
#player-wrap{display:flex;align-items:center;gap:6px;flex:1;min-width:140px}
#player-wrap label{font-size:11px;color:var(--t2);white-space:nowrap}
#inp-player{flex:1;min-width:80px}

/* ── NAV ── */
#nav{background:var(--s1);border-top:1px solid var(--bd);flex-shrink:0;padding:6px 10px 4px}
#nav-rows{display:flex;flex-direction:column;gap:4px}
.nav-row{display:flex;gap:3px;justify-content:center}
.hcard{width:56px;height:56px;min-height:44px;border-radius:6px;border:2px solid transparent;cursor:pointer;display:flex;flex-direction:column;align-items:center;justify-content:center;font-size:10px;font-weight:700;user-select:none;position:relative;transition:transform .1s}
.hcard:active{transform:scale(.95)}
.hcard.active{border-color:var(--green-hi)!important;box-shadow:0 0 0 1px var(--green-hi)}
.hcard .hn{font-size:9px;font-weight:600;opacity:.65;margin-bottom:1px}
.hcard .hp{font-size:9px;opacity:.55}
.hcard .hs{font-size:12px;font-weight:800}
.hcard.active::after{content:'';position:absolute;bottom:-8px;left:50%;transform:translateX(-50%);border-left:6px solid transparent;border-right:6px solid transparent;border-top:7px solid var(--green-hi)}
.hc-red{background:#C0392B;color:#fff}
.hc-blue{background:#1a5bb5;color:#fff}
.hc-g1{background:#4a4a4a;color:#fff}
.hc-g2{background:#2a2a2a;color:#fff}
.hc-g3{background:#111;color:#aaa}
.hc-empty{background:#1e2530;color:#444;border:1px solid #2a3040!important}

#nav-footer{display:flex;align-items:center;justify-content:space-between;margin-top:5px;gap:6px}
.mode-btn{padding:4px 12px;border-radius:4px;border:1px solid var(--bd);background:transparent;color:var(--t2);font:700 11px/1 inherit;cursor:pointer;height:28px}
.mode-btn.active{background:var(--mg);color:#fff;border-color:var(--mg)}

/* ── RIGHT PANEL ── */
#right{display:flex;flex-direction:column;overflow-y:auto;background:var(--s1)}
#right::-webkit-scrollbar{width:4px}
#right::-webkit-scrollbar-thumb{background:var(--bd)}
.sec{padding:12px 14px;border-bottom:1px solid var(--bd)}
.stitle{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:1.5px;color:var(--t3);margin-bottom:9px}

/* status bar */
#statusbar{padding:5px 14px;font-size:11px;color:var(--t3);font-family:'Courier New',monospace;background:var(--s1);border-bottom:1px solid var(--bd);flex-shrink:0;display:flex;gap:10px;align-items:center}
#ls-ok{color:#2ea043}

/* par buttons */
.par-grp{display:flex;gap:5px}
.par-btn{width:40px;height:36px;border-radius:5px;border:1px solid var(--bd);background:var(--s2);color:var(--t1);font:700 14px/1 inherit;cursor:pointer}
.par-btn.active{background:var(--mg);border-color:var(--mg);color:#fff}

/* dist + total row */
.dist-row{display:flex;align-items:center;gap:8px;margin-bottom:8px}
.dist-row label{display:flex;align-items:center;gap:5px;font-size:12px;color:var(--t2);cursor:pointer;white-space:nowrap}
.dist-row input[type=checkbox]{width:15px;height:15px;accent-color:var(--mg)}
.dist-row input[type=number]{width:72px}
.dist-divider{width:1px;height:22px;background:var(--bd);margin:0 4px}

/* Delta picker display */
#delta-display{display:flex;align-items:center;gap:8px;margin-bottom:8px}
#delta-val-btn{height:44px;min-width:80px;padding:0 16px;border-radius:7px;border:2px solid var(--bd);background:var(--s2);color:var(--t1);font:800 20px/1 inherit;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:background .15s}
#delta-val-btn:active{background:var(--bd)}
.clear-hole-btn{height:44px;padding:0 12px;border-radius:6px;border:1px solid #7d1a1a;background:#3d1515;color:#f88;font:600 11px/1 inherit;cursor:pointer;margin-left:auto}
.clear-hole-btn:active{background:#5c1a1a}

/* Shot type */
.type-wrap{display:flex;flex-wrap:wrap;gap:4px}
.tbtn{padding:6px 10px;border-radius:5px;border:1px solid var(--bd);background:var(--s2);color:var(--t2);font:700 11px/1 inherit;cursor:pointer;min-height:36px}
.tbtn.active{background:var(--mg);color:#fff;border-color:var(--mg)}
.auto-badge{font-size:9px;padding:1px 4px;border-radius:3px;background:#2a3a2a;color:#5c8c5c;border:1px solid #3a5a3a;margin-left:3px;vertical-align:middle}

/* shot nav */
.shot-nav{display:flex;align-items:center;gap:6px;margin-bottom:10px}
.shot-nav-btn{flex:1;height:48px;border-radius:7px;border:1px solid var(--bd);background:var(--s2);color:var(--t1);font:700 13px/1 inherit;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:4px}
.shot-nav-btn:active{background:var(--bd)}
.shot-nav-btn:disabled{opacity:.35;cursor:not-allowed}
.shot-info-box{flex:1;text-align:center;font-family:'Courier New',monospace;font-size:14px;color:var(--gold);font-weight:700}

/* options */
.opt-row{display:flex;align-items:center;gap:8px;margin-bottom:7px;font-size:13px}
.opt-row input[type=checkbox]{accent-color:var(--mg);width:15px;height:15px}
.opt-sub{margin-left:23px;display:flex;gap:8px;flex-wrap:wrap;margin-top:3px}

/* ── DELTA PICKER MODAL ── */
#picker-modal{display:none;position:fixed;inset:0;z-index:500;background:rgba(0,0,0,.7);align-items:flex-end;justify-content:center}
#picker-modal.show{display:flex}
#picker-box{background:var(--s1);border:1px solid var(--bd);border-radius:14px 14px 0 0;width:100%;max-width:420px;padding-bottom:env(safe-area-inset-bottom,0)}
#picker-header{display:flex;align-items:center;justify-content:space-between;padding:14px 18px 10px}
#picker-header h3{font-size:15px;font-weight:700}
#picker-close{background:none;border:none;color:var(--t2);font-size:22px;cursor:pointer;line-height:1;padding:2px 6px}
#picker-scroll{height:220px;overflow-y:auto;scroll-snap-type:y mandatory;scrollbar-width:none}
#picker-scroll::-webkit-scrollbar{display:none}
.picker-item{height:44px;display:flex;align-items:center;justify-content:center;font-size:18px;font-weight:700;cursor:pointer;scroll-snap-align:start;color:var(--t2);transition:color .1s,background .1s;border-radius:6px;margin:1px 10px}
.picker-item:active,.picker-item.sel{color:#fff}
.picker-item.sel-red{background:#C0392B;color:#fff}
.picker-item.sel-blue{background:#1a5bb5;color:#fff}
.picker-item.sel-g1{background:#4a4a4a;color:#fff}
.picker-item.sel-g2{background:#2a2a2a;color:#fff}
.picker-item.sel-g3{background:#111;color:#aaa}

/* ── SETTINGS DRAWER ── */
#settings-drawer{position:fixed;top:0;right:0;width:320px;height:100%;background:var(--s1);border-left:1px solid var(--bd);z-index:400;transform:translateX(100%);transition:transform .25s;display:flex;flex-direction:column;overflow:hidden}
#settings-drawer.open{transform:translateX(0)}
#settings-overlay{display:none;position:fixed;inset:0;z-index:399;background:rgba(0,0,0,.5)}
#settings-overlay.show{display:block}
#sdh{display:flex;align-items:center;justify-content:space-between;padding:14px 16px;border-bottom:1px solid var(--bd);flex-shrink:0}
#sdh h2{font-size:16px;font-weight:700}
#sd-close{background:none;border:none;color:var(--t2);font-size:22px;cursor:pointer;line-height:1}
#sd-body{overflow-y:auto;flex:1;padding:14px}
.sd-sec{margin-bottom:18px}
.sd-sec-title{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:1.5px;color:var(--t3);margin-bottom:8px}
.sd-row{display:flex;align-items:center;gap:8px;margin-bottom:7px;font-size:12px;color:var(--t2)}
.sd-row label{flex:1;cursor:pointer}
input[type=range]{accent-color:var(--mg);flex:1}

/* ── NEW ROUND MODAL ── */
#newround-modal{display:none;position:fixed;inset:0;z-index:600;background:rgba(0,0,0,.7);align-items:center;justify-content:center}
#newround-modal.show{display:flex}
.modal-box{background:var(--s1);border:1px solid var(--bd);border-radius:12px;padding:22px;min-width:300px;max-width:380px;width:90%}
.modal-box h3{margin-bottom:14px;font-size:16px}
.modal-box .opt-row{font-size:14px}
.modal-actions{display:flex;gap:8px;justify-content:flex-end;margin-top:16px}

/* ── TOAST ── */
#toast{position:fixed;bottom:30px;left:50%;transform:translateX(-50%) translateY(30px);background:rgba(30,40,30,.95);color:#cfc;padding:10px 20px;border-radius:8px;font-size:13px;opacity:0;transition:all .3s;pointer-events:none;z-index:9999;white-space:nowrap}
#toast.show{opacity:1;transform:translateX(-50%) translateY(0)}

/* ── RESPONSIVE ── */
@media(max-width:768px){
  #main{grid-template-columns:1fr;grid-template-rows:auto 1fr}
  #left{height:55vw;min-height:200px}
  #right{overflow-y:auto}
}
</style>
</head>
<body>

<!-- HEADER -->
<div id="hdr">
  <div class="logo">⛳ GOLF <span>OVERLAY</span></div>
  <small style="color:var(--t3);font-size:10px">v4.1</small>
  <span class="sp"></span>
  <label style="font-size:11px;color:var(--t2)">画幅</label>
  <select id="sel-ratio">
    <option value="16:9">16:9</option>
    <option value="9:16">9:16</option>
    <option value="1:1">1:1</option>
  </select>
  <button class="hbtn warn" id="btn-new">NEW</button>
  <button class="hbtn" id="btn-settings">⚙ 设置</button>
</div>

<!-- MAIN -->
<div id="main">
  <!-- LEFT -->
  <div id="left">
    <!-- Preview -->
    <div id="preview" id="preview-area">
      <img id="bg-img" style="display:none;opacity:.45">
      <canvas id="cv"></canvas>
      <div id="upload-hint">
        <div class="ic">🖼</div>
        <div>点击上传背景图 / 拖拽图片到此处</div>
        <div style="font-size:11px;color:var(--t3)">仅用于预览，不参与导出</div>
      </div>
      <button id="change-bg-btn">🔄 更换背景</button>
      <input type="file" id="bg-file" accept="image/*">
    </div>

    <!-- Toolbar: player + export -->
    <div id="ptool">
      <div id="player-wrap">
        <label for="inp-player">🏌️</label>
        <input type="text" id="inp-player" placeholder="PLAYER NAME" maxlength="20">
      </div>
      <span class="sp"></span>
      <select id="sel-res">
        <option value="2160" selected>4K 2160p</option>
        <option value="1440">1440p</option>
        <option value="1080">1080p</option>
      </select>
      <select id="sel-bg">
        <option value="transparent">透明</option>
        <option value="black">黑底</option>
      </select>
      <button class="hbtn prim" id="btn-export">⬇ EXPORT PNG</button>
    </div>

    <!-- Scorecard Nav -->
    <div id="nav">
      <div id="nav-rows">
        <div class="nav-row" id="nav-row1"></div>
        <div class="nav-row" id="nav-row2"></div>
      </div>
      <div id="nav-footer">
        <div style="display:flex;gap:4px">
          <button class="mode-btn" id="mode-tp" onclick="setMode('topar')">To Par</button>
          <button class="mode-btn" id="mode-gr" onclick="setMode('gross')">Gross</button>
        </div>
        <button class="hbtn" id="btn-next-hole" style="height:28px;padding:0 10px;font-size:11px">Next Hole →</button>
      </div>
    </div>
  </div>

  <!-- RIGHT PANEL -->
  <div id="right">
    <!-- Status bar -->
    <div id="statusbar">
      <span id="ls-ok">LS✓</span>
      <span id="status-txt">Ready</span>
    </div>

    <!-- Hole info -->
    <div class="sec">
      <div class="stitle" id="sec-hole-lbl">第 1 洞 — PAR 4</div>

      <!-- Par -->
      <div style="display:flex;align-items:center;gap:10px;margin-bottom:10px">
        <span style="font-size:11px;color:var(--t2);min-width:28px">Par</span>
        <div class="par-grp">
          <button class="par-btn" id="par3" onclick="setPar(3)">3</button>
          <button class="par-btn" id="par4" onclick="setPar(4)">4</button>
          <button class="par-btn" id="par5" onclick="setPar(5)">5</button>
        </div>
      </div>

      <!-- Dist + Total toggle -->
      <div class="dist-row">
        <label><input type="checkbox" id="chk-dist"> 距离</label>
        <input type="number" id="inp-dist" placeholder="450" min="0" max="700">
        <div class="dist-divider"></div>
        <label style="display:flex;align-items:center;gap:5px;font-size:12px;color:var(--t2);cursor:pointer;white-space:nowrap">
          <input type="checkbox" id="chk-total" style="width:15px;height:15px;accent-color:var(--mg)"> 总杆
        </label>
      </div>
    </div>

    <!-- Final Score -->
    <div class="sec">
      <div class="stitle">Final Score (Delta)</div>
      <div id="delta-display">
        <button id="delta-val-btn" onclick="openPicker()">—</button>
        <button class="clear-hole-btn" id="btn-clear-hole">清空本洞</button>
      </div>
      <div id="gross-disp" style="font-size:11px;color:var(--t3)"></div>
    </div>

    <!-- Shot -->
    <div class="sec">
      <div class="stitle">击球 Shot</div>
      <div class="shot-nav">
        <button class="shot-nav-btn" id="btn-prev" onclick="prevShot()">◀ PREV</button>
        <div class="shot-info-box" id="shot-info">— / —</div>
        <button class="shot-nav-btn" id="btn-next" onclick="nextShot()">NEXT ▶</button>
      </div>
      <div class="stitle" style="margin-bottom:6px">类型 <span id="type-mode-badge" class="auto-badge">AUTO</span></div>
      <div class="type-wrap" id="type-grp">
        <button class="tbtn" data-type="TEE">TEE</button>
        <button class="tbtn" data-type="APPR">APPR</button>
        <button class="tbtn" data-type="CHIP">CHIP</button>
        <button class="tbtn" data-type="PUTT">PUTT</button>
        <button class="tbtn" data-type="FOR_BIRDIE">For Birdie</button>
        <button class="tbtn" data-type="FOR_PAR">For Par</button>
        <button class="tbtn" data-type="FOR_BOGEY">For Bogey</button>
      </div>
    </div>

    <!-- Options -->
    <div class="sec">
      <div class="stitle">显示选项</div>
      <div class="opt-row"><input type="checkbox" id="chk-shot" checked><label for="chk-shot">Shot Overlay</label></div>
      <div class="opt-row"><input type="checkbox" id="chk-score"><label for="chk-score">Scorecard Overlay</label></div>
      <div class="opt-sub" id="score-sub" style="display:none">
        <label style="display:flex;align-items:center;gap:4px;font-size:12px"><input type="radio" name="scr" value="front9"> 前9</label>
        <label style="display:flex;align-items:center;gap:4px;font-size:12px"><input type="radio" name="scr" value="back9"> 后9</label>
        <label style="display:flex;align-items:center;gap:4px;font-size:12px"><input type="radio" name="scr" value="18" checked> 18洞</label>
      </div>
    </div>

    <div style="height:20px;flex-shrink:0"></div>
  </div>
</div>

<!-- DELTA PICKER MODAL -->
<div id="picker-modal">
  <div id="picker-box">
    <div id="picker-header">
      <h3>Final Score (Delta)</h3>
      <button id="picker-close" onclick="closePicker()">×</button>
    </div>
    <div id="picker-scroll"></div>
    <div style="padding:12px 18px 20px;display:flex;gap:8px">
      <button class="hbtn" style="flex:1;height:44px;font-size:14px" onclick="closePicker()">取消</button>
    </div>
  </div>
</div>

<!-- SETTINGS DRAWER -->
<div id="settings-overlay" onclick="closeSettings()"></div>
<div id="settings-drawer">
  <div id="sdh">
    <h2>⚙ 设置</h2>
    <button id="sd-close" onclick="closeSettings()">×</button>
  </div>
  <div id="sd-body">
    <div class="sd-sec">
      <div class="sd-sec-title">背景图</div>
      <div class="sd-row">
        <label>背景透明度</label>
        <input type="range" id="bg-opacity" min="0" max="100" value="45">
        <span id="bg-opacity-val" style="width:30px;text-align:right">45%</span>
      </div>
      <button class="hbtn" onclick="clearBg()" style="width:100%;justify-content:center;margin-bottom:6px">清除背景图</button>
    </div>
    <div class="sd-sec">
      <div class="sd-sec-title">Safe Zone</div>
      <div class="sd-row">
        <label for="chk-sz">显示安全区虚线</label>
        <input type="checkbox" id="chk-sz" style="accent-color:var(--mg)">
      </div>
      <div class="sd-row">
        <label>安全区大小</label>
        <select id="sz-size">
          <option value="5">5%</option>
          <option value="10">10%</option>
        </select>
      </div>
    </div>
    <div class="sd-sec">
      <div class="sd-sec-title">球场 Par 管理</div>
      <div style="font-size:12px;color:var(--t2);margin-bottom:8px">逐洞设置在控制区完成，此处批量重置</div>
      <button class="hbtn" onclick="resetAllPars()" style="width:100%;justify-content:center">全部重置为 Par 4</button>
    </div>
    <div class="sd-sec">
      <div class="sd-sec-title">导出默认参数</div>
      <div class="sd-row" style="color:var(--t1)">默认：4K (2160p) + 透明背景</div>
    </div>
  </div>
</div>

<!-- NEW ROUND MODAL -->
<div id="newround-modal">
  <div class="modal-box">
    <h3>🏌️ 清空本轮 New Round</h3>
    <div class="opt-row"><input type="checkbox" id="m-scores" checked><label for="m-scores">清空本轮成绩</label></div>
    <div class="opt-row"><input type="checkbox" id="m-pars"><label for="m-pars">重置全部球场 Par（恢复 Par 4）</label></div>
    <div class="modal-actions">
      <button class="hbtn" onclick="closeNewRound()">取消</button>
      <button class="hbtn prim" onclick="doNewRound()">确认</button>
    </div>
  </div>
</div>

<!-- TOAST -->
<div id="toast"></div>

<script>
// ============================================================
// DATA MODEL & CONSTANTS
// ============================================================
const SHOT_W = 475, SHOT_H = 128;
const ROW1 = 44, ROW2 = 42, ROW3 = 42;
const COL_W = 143, RPAD = 11;

function defState() {
  return {
    playerName: 'PLAYER',
    currentHole: 0,
    displayMode: 'topar',
    ratio: '16:9',
    showShot: true,
    showScore: false,
    scoreRange: '18',
    showTotal: false,
    showDist: false,
    exportBg: 'transparent',
    bgOpacity: 0.45,
    safeZone: false,
    szSize: 5,
    // Per-ratio overlay positions (fractions 0..1)
    overlayPos: { '16:9':{x:.55,y:.04}, '9:16':{x:.55,y:.04}, '1:1':{x:.55,y:.04} },
    scorecardPos: { '16:9':{x:.15,y:.82}, '9:16':{x:.15,y:.82}, '1:1':{x:.15,y:.82} },
    holes: Array.from({length:18}, () => ({par:4,delta:null,distance:null,shots:[],shotIndex:0,manualTypes:{}}))
  };
}

let S = defState();

// ============================================================
// LOCALSTORAGE
// ============================================================
let saveTimer;
function scheduleSave() { clearTimeout(saveTimer); saveTimer = setTimeout(doSave, 350); }
function doSave() {
  try { localStorage.setItem('golf_v41', JSON.stringify(S)); setStatus('LS✓','#2ea043'); } 
  catch(e) { setStatus('LS✗','#f88'); }
}
function loadSaved() {
  try {
    const raw = localStorage.getItem('golf_v41');
    if (!raw) return;
    const saved = JSON.parse(raw);
    S = Object.assign(defState(), saved);
    // ensure arrays/objects integrity
    if (!S.overlayPos || typeof S.overlayPos['16:9'] !== 'object') S.overlayPos = defState().overlayPos;
    if (!S.scorecardPos || typeof S.scorecardPos['16:9'] !== 'object') S.scorecardPos = defState().scorecardPos;
    S.holes = Array.from({length:18}, (_,i) => {
      const saved_h = saved.holes && saved.holes[i];
      return Object.assign({par:4,delta:null,distance:null,shots:[],shotIndex:0,manualTypes:{}}, saved_h || {});
    });
  } catch(e) { console.warn('Load state error', e); }
}

// ============================================================
// HELPERS
// ============================================================
function curHole() { return S.holes[S.currentHole]; }
function getGross(h) { return h.delta === null ? null : h.par + h.delta; }
function totalDelta() { return S.holes.reduce((a,h)=>a+(h.delta??0),0); }
function totalGross() { return S.holes.reduce((a,h)=>a+h.par+(h.delta??0),0); }
function hasIncomplete() { return S.holes.some(h=>h.delta===null); }
function fmtDelta(d) { return d===0?'E':d>0?'+'+d:String(d); }

function deltaColorHex(d) {
  if(d===null) return '#1e2530';
  if(d<=-1) return '#C0392B';
  if(d===0) return '#1a5bb5';
  if(d===1) return '#4a4a4a';
  if(d===2) return '#2a2a2a';
  return '#111111';
}
function deltaCardClass(d) {
  if(d===null) return 'hc-empty';
  if(d<=-1) return 'hc-red';
  if(d===0) return 'hc-blue';
  if(d===1) return 'hc-g1';
  if(d===2) return 'hc-g2';
  return 'hc-g3';
}
function deltaLabel(d) {
  const m={'-3':'Albatross','-2':'Eagle','-1':'Birdie','0':'Par','1':'Bogey','2':'Double'};
  if(d===null) return '—';
  return m[String(d)] || (d>0?'+'+d:String(d));
}
function shotTypeLabel(t) {
  return {TEE:'TEE SHOT',APPR:'APPROACH',CHIP:'CHIP',PUTT:'PUTT',FOR_BIRDIE:'For Birdie',FOR_PAR:'For Par',FOR_BOGEY:'For Bogey',FOR_DOUBLE:'For Double',FOR_TRIPLE:'For Triple'}[t]||t||'';
}
function autoType(h, idx) {
  const gross = getGross(h); if(!gross) return 'TEE';
  if(idx===0) return 'TEE';
  if(idx===gross-1) {
    if(h.delta<=-1) return 'FOR_BIRDIE';
    if(h.delta===0) return 'FOR_PAR';
    if(h.delta===1) return 'FOR_BOGEY';
    if(h.delta===2) return 'FOR_DOUBLE';
    return 'FOR_TRIPLE';
  }
  if(h.par>=4 && idx===1) return 'APPR';
  return 'CHIP';
}

function setStatus(txt, color) {
  const el = document.getElementById('ls-ok');
  el.textContent = txt; el.style.color = color;
}
function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg; t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2800);
}

// ============================================================
// MUTATIONS
// ============================================================
function setPar(v) { curHole().par = v; reconcileShots(curHole()); render(); scheduleSave(); }

function setDelta(d) {
  const h = curHole(); h.delta = d; h.manualTypes = {};
  reconcileShots(h); h.shotIndex = 0;
  render(); scheduleSave();
}

function reconcileShots(h) {
  const gross = getGross(h);
  if(gross===null) { h.shots=[]; h.shotIndex=0; return; }
  while(h.shots.length > gross) h.shots.pop();
  while(h.shots.length < gross) h.shots.push({type:null});
  if(h.shotIndex >= gross) h.shotIndex = gross-1;
  if(h.shotIndex < 0) h.shotIndex = 0;
  h.shots.forEach((s,i) => { if(!s.type) s.type = autoType(h,i); });
}

function clearHole() {
  const h = curHole(); h.delta=null; h.shots=[]; h.shotIndex=0; h.manualTypes={};
  render(); scheduleSave();
}

function setMode(m) { S.displayMode = m; render(); scheduleSave(); }

function prevShot() { const h=curHole(); if(h.delta===null||h.shotIndex<=0) return; h.shotIndex--; render(); scheduleSave(); }
function nextShot() { const h=curHole(); const g=getGross(h); if(!g||h.shotIndex>=g-1) return; h.shotIndex++; render(); scheduleSave(); }

function setShotType(type) {
  const h = curHole(); if(h.delta===null) return;
  h.shots[h.shotIndex] = {type};
  h.manualTypes[h.shotIndex] = true;
  render(); scheduleSave();
}

function resetAllPars() { S.holes.forEach(h=>h.par=4); render(); scheduleSave(); closeSettings(); }

function gotoNextHole() {
  // find next unfilled hole
  for(let i=1;i<=18;i++) {
    const idx = (S.currentHole + i) % 18;
    if(S.holes[idx].delta===null) { S.currentHole=idx; render(); scheduleSave(); return; }
  }
  // all filled, just go next
  S.currentHole = (S.currentHole+1)%18; render(); scheduleSave();
}

// ============================================================
// CANVAS ENGINE
// ============================================================
let cvEl, dpr = 1;
let cvCssW = 0, cvCssH = 0; // CSS size of canvas
let cvPhysW = 0, cvPhysH = 0; // physical pixels
let dragging = null, dragStart = {};

function getCanvasCssDims() {
  const area = document.getElementById('preview');
  const aw = area.clientWidth||800, ah = area.clientHeight||450;
  let cw, ch;
  if(S.ratio==='16:9') { ch=ah; cw=ah*(16/9); if(cw>aw){cw=aw;ch=aw*(9/16);} }
  else if(S.ratio==='9:16') { cw=aw; ch=aw*(16/9); if(ch>ah){ch=ah;cw=ah*(9/16);} }
  else { const s=Math.min(aw,ah); cw=s; ch=s; }
  return {w:Math.floor(cw), h:Math.floor(ch)};
}

function initCanvas() {
  cvEl = document.getElementById('cv');
  dpr = window.devicePixelRatio || 1;

  cvEl.addEventListener('mousedown', onDragStart);
  window.addEventListener('mousemove', onDragMove);
  window.addEventListener('mouseup', onDragEnd);
  cvEl.addEventListener('touchstart', onTouchStart, {passive:false});
  window.addEventListener('touchmove', onTouchMove, {passive:false});
  window.addEventListener('touchend', onDragEnd);
}

function onDragStart(e) {
  const pt = evPoint(e);
  const rect = cvEl.getBoundingClientRect();
  const mx = (pt.x - rect.left) / rect.width * cvCssW;
  const my = (pt.y - rect.top) / rect.height * cvCssH;

  const scale = cvCssW / 1920;

  // hit test Shot Overlay
  if(S.showShot && curHole().delta !== null) {
    const pos = S.overlayPos[S.ratio];
    const ox = pos.x * cvCssW, oy = pos.y * cvCssH;
    const ow = SHOT_W * scale, oh = SHOT_H * scale;
    if(mx>=ox && mx<=ox+ow && my>=oy && my<=oy+oh) {
      dragging = 'overlay'; dragStart={mx,my,ox,oy}; e.preventDefault(); return;
    }
  }
  // hit test Scorecard
  if(S.showScore) {
    const pos = S.scorecardPos[S.ratio];
    const sx = pos.x * cvCssW, sy = pos.y * cvCssH;
    const sw = getSCWidth(scale), sh = getSCHeight(scale);
    if(mx>=sx && mx<=sx+sw && my>=sy && my<=sy+sh) {
      dragging = 'scorecard'; dragStart={mx,my,ox:sx,oy:sy}; e.preventDefault();
    }
  }
}

function onDragMove(e) {
  if(!dragging) return;
  e.preventDefault();
  const pt = evPoint(e);
  const rect = cvEl.getBoundingClientRect();
  const mx = (pt.x - rect.left) / rect.width * cvCssW;
  const my = (pt.y - rect.top) / rect.height * cvCssH;
  const dx = mx - dragStart.mx, dy = my - dragStart.my;
  if(dragging==='overlay') {
    const p = S.overlayPos[S.ratio];
    p.x = Math.max(0, Math.min(.99, (dragStart.ox+dx)/cvCssW));
    p.y = Math.max(0, Math.min(.99, (dragStart.oy+dy)/cvCssH));
  } else {
    const p = S.scorecardPos[S.ratio];
    p.x = Math.max(0, Math.min(.99, (dragStart.ox+dx)/cvCssW));
    p.y = Math.max(0, Math.min(.99, (dragStart.oy+dy)/cvCssH));
  }
  redrawOnly();
  scheduleSave();
}

function onDragEnd() { dragging = null; }
function evPoint(e) {
  if(e.touches && e.touches.length) return {x:e.touches[0].clientX, y:e.touches[0].clientY};
  if(e.changedTouches && e.changedTouches.length) return {x:e.changedTouches[0].clientX, y:e.changedTouches[0].clientY};
  return {x:e.clientX, y:e.clientY};
}
function onTouchStart(e) { if(e.touches.length===1) onDragStart(e); }
function onTouchMove(e) { if(e.touches.length===1) onDragMove(e); }

// ── Resize canvas & redraw ──
function render() {
  dpr = window.devicePixelRatio || 1;
  const dims = getCanvasCssDims();
  cvCssW = dims.w; cvCssH = dims.h;
  cvPhysW = Math.round(dims.w * dpr);
  cvPhysH = Math.round(dims.h * dpr);

  cvEl.width = cvPhysW;
  cvEl.height = cvPhysH;
  cvEl.style.width = cvCssW + 'px';
  cvEl.style.height = cvCssH + 'px';

  const area = document.getElementById('preview');
  cvEl.style.left = ((area.clientWidth - cvCssW) / 2) + 'px';
  cvEl.style.top = ((area.clientHeight - cvCssH) / 2) + 'px';

  redrawOnly();
  buildHoleNav();
  buildDeltaBtn();
  updateRightPanel();
}

function redrawOnly() {
  const ctx = cvEl.getContext('2d');
  ctx.setTransform(dpr, 0, 0, dpr, 0, 0); // scale for retina
  ctx.clearRect(0, 0, cvCssW, cvCssH);
  drawOverlays(ctx, cvCssW, cvCssH, false);
}

// ── Core draw function (works for both preview & export) ──
// w,h = logical pixels (CSS px for preview; export target px for export)
function drawOverlays(ctx, w, h, forExport, bgOverride) {
  if(forExport) {
    const bg = bgOverride || S.exportBg;
    if(bg === 'black') { ctx.fillStyle='#000'; ctx.fillRect(0,0,w,h); }
    // else transparent: nothing
  }

  if(S.safeZone) drawSafeZone(ctx, w, h);

  const scale = w / 1920;
  const h0 = curHole();

  if(S.showShot && h0.delta !== null) {
    const pos = S.overlayPos[S.ratio];
    drawShotOverlay(ctx, pos.x*w, pos.y*h, scale, w, h, forExport);
  }
  if(S.showScore) {
    const pos = S.scorecardPos[S.ratio];
    drawScorecardOverlay(ctx, pos.x*w, pos.y*h, scale);
  }
}

function drawSafeZone(ctx, w, h) {
  const pct = S.szSize / 100;
  const x = w*pct, y = h*pct, rw = w*(1-2*pct), rh = h*(1-2*pct);
  ctx.save();
  ctx.setLineDash([8,6]);
  ctx.strokeStyle = 'rgba(255,255,255,0.3)';
  ctx.lineWidth = 1;
  ctx.strokeRect(x, y, rw, rh);
  ctx.restore();
}

// ── SHOT OVERLAY ──
function drawShotOverlay(ctx, X, Y, scale, canvasW, canvasH, forExport) {
  const h = curHole();
  const W = SHOT_W * scale;
  const H = SHOT_H * scale;
  const r1 = ROW1*scale, r2 = ROW2*scale, r3 = ROW3*scale;
  const colW = COL_W * scale;
  const rO = 4*scale, rpad = RPAD*scale;

  ctx.save();
  rrect(ctx, X, Y, W, H, rO);
  ctx.clip();

  // Left col bg
  ctx.fillStyle = '#1B5E3B';
  ctx.fillRect(X, Y, colW, H);

  // Right panel bg
  ctx.fillStyle = '#F8F8F8';
  ctx.fillRect(X+colW, Y, W-colW, H);

  // Row2 green bg
  ctx.fillStyle = '#1B5E3B';
  ctx.fillRect(X+colW, Y+r1, W-colW, r2);

  // ── Left col: hole number ──
  ctx.fillStyle = '#fff';
  ctx.font = `900 ${Math.round(52*scale)}px Impact,'Arial Black',sans-serif`;
  ctx.textAlign = 'center';
  ctx.textBaseline = 'middle';
  ctx.fillText(String(S.currentHole+1), X+colW/2, Y+H/2 - 4*scale);

  // PAR text + number
  ctx.fillStyle = '#B8962E';
  ctx.font = `700 ${Math.round(11*scale)}px system-ui,sans-serif`;
  ctx.fillText('PAR', X+colW/2, Y+H-20*scale);
  ctx.font = `900 ${Math.round(22*scale)}px system-ui,sans-serif`;
  ctx.fillText(String(h.par), X+colW/2, Y+H-8*scale);

  // ── Row1: player name + optional total badge ──
  const rx = X+colW+rpad;
  const rW = W-colW-2*rpad;
  let nameMaxW = rW;
  let totalBadgeW = 0;

  if(S.showTotal) {
    totalBadgeW = 58*scale;
    nameMaxW = rW - totalBadgeW - 6*scale;
  }

  ctx.fillStyle = '#111';
  ctx.font = `800 ${Math.round(18*scale)}px system-ui,sans-serif`;
  ctx.textAlign = 'left';
  ctx.textBaseline = 'middle';
  let name = S.playerName.toUpperCase();
  while(ctx.measureText(name).width > nameMaxW && name.length > 1) name = name.slice(0,-1);
  if(name !== S.playerName.toUpperCase()) name = name.slice(0,-1)+'…';
  ctx.fillText(name, rx, Y+r1/2);

  if(S.showTotal) {
    const td = totalDelta(), tg = totalGross();
    const incomplete = hasIncomplete();
    let bColor = td<0?'#C0392B':td>0?'#2a6e3a':'#4a4a4a';
    let bTxt = S.displayMode==='topar' ? fmtDelta(td) : String(tg);
    if(S.displayMode==='gross') bColor = '#4a4a4a';
    const bx = X+W-rpad-totalBadgeW, by = Y+6*scale, bh = r1-12*scale;
    rrect(ctx, bx, by, totalBadgeW, bh, 2*scale);
    ctx.fillStyle = bColor; ctx.fill();
    ctx.fillStyle = '#fff';
    ctx.font = `700 ${Math.round(13*scale)}px system-ui,sans-serif`;
    ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
    ctx.fillText(bTxt, bx+totalBadgeW/2, by+bh/2);
  }

  // ── Row2: progress squares (RIGHT-ALIGNED) ──
  const gross = getGross(h);
  const si = h.shotIndex;
  const sqSz = 22*scale, sqGap = 5*scale;
  const totalSqW = gross*(sqSz+sqGap) - sqGap;
  let sqX = X+W-rpad-totalSqW;
  const sqY = Y+r1+r2/2;

  for(let i=0;i<gross;i++) {
    const bx = sqX + i*(sqSz+sqGap);
    const by = sqY - sqSz/2;
    const isCur = i===si, isPast = i<si;

    if(isCur) {
      rrect(ctx, bx, by, sqSz, sqSz, 3*scale);
      ctx.fillStyle = '#fff'; ctx.fill();
      ctx.fillStyle = '#1B5E3B';
      ctx.font = `700 ${Math.round(10*scale)}px system-ui,sans-serif`;
      ctx.textAlign='center'; ctx.textBaseline='middle';
      ctx.fillText(String(i+1), bx+sqSz/2, sqY);
    } else if(isPast) {
      rrect(ctx, bx, by, sqSz, sqSz, 3*scale);
      ctx.fillStyle = 'rgba(255,255,255,0.25)'; ctx.fill();
      ctx.fillStyle = 'rgba(255,255,255,0.8)';
      ctx.font = `700 ${Math.round(10*scale)}px system-ui,sans-serif`;
      ctx.textAlign='center'; ctx.textBaseline='middle';
      ctx.fillText(String(i+1), bx+sqSz/2, sqY);
    } else {
      rrect(ctx, bx, by, sqSz, sqSz, 3*scale);
      ctx.fillStyle = 'rgba(255,255,255,0.12)'; ctx.fill();
      ctx.fillStyle = 'rgba(255,255,255,0.3)';
      ctx.font = `700 ${Math.round(10*scale)}px system-ui,sans-serif`;
      ctx.textAlign='center'; ctx.textBaseline='middle';
      ctx.fillText(String(i+1), bx+sqSz/2, sqY);
    }
  }

  // ── Row3 ──
  const r3y = Y+r1+r2;

  // Left: TO PIN distance
  if(S.showDist && h.distance) {
    ctx.fillStyle = '#888';
    ctx.font = `${Math.round(8*scale)}px system-ui,sans-serif`;
    ctx.textAlign='left'; ctx.textBaseline='top';
    ctx.fillText('TO PIN', rx, r3y+5*scale);
    ctx.fillStyle = '#111';
    ctx.font = `700 ${Math.round(16*scale)}px system-ui,sans-serif`;
    ctx.textBaseline='bottom';
    ctx.fillText(String(h.distance), rx, r3y+r3-5*scale);
    ctx.fillStyle = '#666';
    ctx.font = `${Math.round(8*scale)}px system-ui,sans-serif`;
    ctx.textBaseline='bottom';
    const distW = ctx.measureText(String(h.distance)).width + 2*scale;
    // unit
    ctx.font = `${Math.round(8*scale)}px system-ui,sans-serif`;
    ctx.fillStyle = '#888';
    ctx.textBaseline = 'middle';
    ctx.fillText('YDS', rx + ctx.measureText(String(h.distance)+'0').width*0.65, r3y+r3*0.72);
  }

  // Right: shot type badge OR result badge
  const isLast = si===gross-1;
  let r3txt = '', r3bg = '';
  if(isLast) { r3txt=deltaLabel(h.delta); r3bg=deltaColorHex(h.delta); }
  else { const shot=h.shots[si]; r3txt=shotTypeLabel(shot?.type); r3bg='#1B5E3B'; }

  if(r3txt) {
    ctx.font = `700 ${Math.round(13*scale)}px system-ui,sans-serif`;
    const tw = ctx.measureText(r3txt).width;
    const bW = tw+18*scale, bH = 22*scale;
    const bx = X+W-rpad-bW, by = r3y+(r3-bH)/2;
    rrect(ctx, bx, by, bW, bH, 2*scale);
    ctx.fillStyle = r3bg; ctx.fill();
    ctx.fillStyle = '#fff';
    ctx.textAlign='center'; ctx.textBaseline='middle';
    ctx.fillText(r3txt, bx+bW/2, by+bH/2);
  }

  // Dividers
  ctx.strokeStyle = '#D0D0D0';
  ctx.lineWidth = Math.max(0.5, 0.5*scale);
  ctx.beginPath();
  ctx.moveTo(X+colW, Y+r1); ctx.lineTo(X+W, Y+r1); ctx.stroke();
  ctx.beginPath();
  ctx.moveTo(X+colW, Y+r1+r2); ctx.lineTo(X+W, Y+r1+r2); ctx.stroke();

  ctx.restore();
}

// ── SCORECARD OVERLAY ──
function getSCRange() {
  return S.scoreRange==='front9'?[0,9]:S.scoreRange==='back9'?[9,18]:[0,18];
}
function getSCWidth(scale) {
  const [s,e]=getSCRange(); return (50+(e-s)*36+55)*scale;
}
function getSCHeight(scale) { return 86*scale; }

function drawScorecardOverlay(ctx, X, Y, scale) {
  const [start,end] = getSCRange();
  const count = end-start;
  const labelW=50*scale, colW=36*scale, totalW=55*scale;
  const hdrH=30*scale, rowH=28*scale;
  const W=labelW+count*colW+totalW, H=hdrH+rowH*2;

  ctx.save();
  rrect(ctx, X, Y, W, H, 4*scale);
  ctx.fillStyle='rgba(0,0,0,.85)'; ctx.fill();
  rrect(ctx, X, Y, W, H, 4*scale); ctx.clip();

  // Header
  ctx.fillStyle='#1B5E3B'; ctx.fillRect(X,Y,W,hdrH);
  ctx.fillStyle='rgba(255,255,255,.45)';
  ctx.font=`600 ${Math.round(9*scale)}px system-ui,sans-serif`;
  ctx.textAlign='center'; ctx.textBaseline='middle';
  ctx.fillText('HOLE', X+labelW/2, Y+hdrH/2);
  for(let i=0;i<count;i++) {
    const hi=start+i, cx=X+labelW+i*colW+colW/2;
    ctx.fillStyle = hi===S.currentHole ? '#B8962E':'rgba(255,255,255,.6)';
    ctx.font=`700 ${Math.round(10*scale)}px system-ui,sans-serif`;
    ctx.fillText(String(hi+1), cx, Y+hdrH/2);
  }
  ctx.fillStyle='rgba(255,255,255,.6)';
  ctx.font=`700 ${Math.round(9*scale)}px system-ui,sans-serif`;
  ctx.fillText('TOT', X+W-totalW/2, Y+hdrH/2);

  // Par row
  const parY=Y+hdrH;
  ctx.fillStyle='rgba(255,255,255,.06)'; ctx.fillRect(X,parY,W,rowH);
  ctx.fillStyle='rgba(255,255,255,.4)';
  ctx.font=`500 ${Math.round(9*scale)}px system-ui,sans-serif`;
  ctx.fillText('PAR', X+labelW/2, parY+rowH/2);
  let parTot=0;
  for(let i=0;i<count;i++) {
    const hi=start+i, h=S.holes[hi];
    parTot+=h.par;
    ctx.fillStyle='#B8962E';
    ctx.font=`600 ${Math.round(11*scale)}px system-ui,sans-serif`;
    ctx.fillText(String(h.par), X+labelW+i*colW+colW/2, parY+rowH/2);
  }
  ctx.fillStyle='#B8962E';
  ctx.font=`700 ${Math.round(11*scale)}px system-ui,sans-serif`;
  ctx.fillText(String(parTot), X+W-totalW/2, parY+rowH/2);

  // Score row
  const scY=parY+rowH;
  ctx.fillStyle='rgba(0,0,0,.3)'; ctx.fillRect(X,scY,W,rowH);
  ctx.fillStyle='rgba(255,255,255,.4)';
  ctx.font=`500 ${Math.round(9*scale)}px system-ui,sans-serif`;
  ctx.fillText('SCORE', X+labelW/2, scY+rowH/2);
  for(let i=0;i<count;i++) {
    const hi=start+i, h=S.holes[hi];
    const cx=X+labelW+i*colW+colW/2;
    if(h.delta===null) {
      ctx.fillStyle='rgba(255,255,255,.2)';
      ctx.font=`600 ${Math.round(10*scale)}px system-ui,sans-serif`;
      ctx.fillText('—', cx, scY+rowH/2);
    } else {
      const bW=26*scale, bH=20*scale;
      rrect(ctx, cx-bW/2, scY+rowH/2-bH/2, bW, bH, 2*scale);
      ctx.fillStyle=deltaColorHex(h.delta); ctx.fill();
      ctx.fillStyle='#fff';
      ctx.font=`700 ${Math.round(10*scale)}px system-ui,sans-serif`;
      const txt=S.displayMode==='topar'?(h.delta===0?'E':h.delta>0?'+'+h.delta:String(h.delta)):String(h.par+h.delta);
      ctx.fillText(txt, cx, scY+rowH/2);
    }
  }
  // Total
  const td=S.holes.slice(start,end).reduce((a,h)=>a+(h.delta??0),0);
  const tg=S.holes.slice(start,end).reduce((a,h)=>a+h.par+(h.delta??0),0);
  ctx.fillStyle='#fff';
  ctx.font=`800 ${Math.round(13*scale)}px system-ui,sans-serif`;
  ctx.fillText(S.displayMode==='topar'?fmtDelta(td):String(tg), X+W-totalW/2, scY+rowH/2);

  // Current hole triangle
  for(let i=0;i<count;i++) {
    if(start+i===S.currentHole) {
      const cx=X+labelW+i*colW+colW/2;
      ctx.fillStyle='#00e676';
      ctx.beginPath();
      ctx.moveTo(cx-5*scale, Y+hdrH-1);
      ctx.lineTo(cx+5*scale, Y+hdrH-1);
      ctx.lineTo(cx, Y+hdrH+6*scale);
      ctx.closePath(); ctx.fill();
    }
  }
  ctx.restore();
}

function rrect(ctx, x, y, w, h, r) {
  r = Math.min(r, w/2, h/2);
  ctx.beginPath();
  ctx.moveTo(x+r,y); ctx.lineTo(x+w-r,y);
  ctx.arcTo(x+w,y, x+w,y+r, r);
  ctx.lineTo(x+w,y+h-r);
  ctx.arcTo(x+w,y+h, x+w-r,y+h, r);
  ctx.lineTo(x+r,y+h);
  ctx.arcTo(x,y+h, x,y+h-r, r);
  ctx.lineTo(x,y+r);
  ctx.arcTo(x,y, x+r,y, r);
  ctx.closePath();
}

// ============================================================
// EXPORT  (P0 fix: toBlob + createObjectURL, no taint)
// ============================================================
function doExport() {
  const res = parseInt(document.getElementById('sel-res').value) || 2160;
  const bg = document.getElementById('sel-bg').value;

  let expW, expH;
  if(S.ratio==='16:9') { expW=Math.round(res*(16/9)); expH=res; }
  else if(S.ratio==='9:16') { expW=Math.round(res*(9/16)); expH=res; }
  else { expW=res; expH=res; }

  let offscreen;
  try {
    offscreen = document.createElement('canvas');
    offscreen.width = expW; offscreen.height = expH;
  } catch(err) {
    showToast('❌ 创建画布失败: ' + err.message);
    console.error(err); return;
  }

  const ctx = offscreen.getContext('2d');
  // For export, NO dpr scaling needed (we draw at exact target res)
  // scale is expW/1920 directly
  drawOverlays(ctx, expW, expH, true, bg);

  const h = curHole();
  const stype = (h.shots[h.shotIndex]?.type||'shot').toLowerCase();
  const fname = `hole${String(S.currentHole+1).padStart(2,'0')}_shot${String(h.shotIndex+1).padStart(2,'0')}_${stype}_${res}p.png`;

  try {
    offscreen.toBlob(blob => {
      if(!blob) { showToast('❌ 导出失败：toBlob 返回空'); return; }
      const url = URL.createObjectURL(blob);
      const a = document.createElement('a');
      a.href = url; a.download = fname;
      document.body.appendChild(a);
      a.click();
      document.body.removeChild(a);
      setTimeout(() => URL.revokeObjectURL(url), 3000);
      showToast(`✅ 导出成功 ${fname}`);
    }, 'image/png');
  } catch(err) {
    // fallback: toDataURL
    try {
      const url = offscreen.toDataURL('image/png');
      const a = document.createElement('a');
      a.href = url; a.download = fname;
      document.body.appendChild(a);
      a.click();
      document.body.removeChild(a);
      showToast(`✅ 导出成功 (fallback)`);
    } catch(e2) {
      showToast('❌ 导出失败: ' + e2.message);
      console.error('Export error', e2);
    }
  }
}

// ============================================================
// UI BUILD
// ============================================================
function buildHoleNav() {
  ['nav-row1','nav-row2'].forEach((id,row) => {
    const container = document.getElementById(id);
    container.innerHTML='';
    for(let i=row*9; i<row*9+9; i++) {
      const h = S.holes[i];
      const card = document.createElement('div');
      card.className = 'hcard ' + deltaCardClass(h.delta);
      if(i===S.currentHole) card.classList.add('active');
      let scoreText='—';
      if(h.delta!==null) {
        scoreText = S.displayMode==='topar' ? (h.delta===0?'E':h.delta>0?'+'+h.delta:String(h.delta)) : String(h.par+h.delta);
      }
      card.innerHTML=`<div class="hn">${i+1}</div><div class="hp">P${h.par}</div><div class="hs">${scoreText}</div>`;
      card.onclick = () => { S.currentHole=i; render(); scheduleSave(); };
      container.appendChild(card);
    }
  });
}

function buildDeltaBtn() {
  const h = curHole();
  const btn = document.getElementById('delta-val-btn');
  if(h.delta===null) {
    btn.textContent='—'; btn.style.background=''; btn.style.color=''; btn.style.borderColor='';
  } else {
    const d=h.delta;
    let bg='#4a4a4a', color='#fff';
    if(d<=-1) bg='#C0392B';
    else if(d===0) bg='#1a5bb5';
    else if(d===1) bg='#4a4a4a';
    else if(d===2) bg='#2a2a2a';
    else bg='#111';
    btn.textContent = d===0?'E':d>0?'+'+d:String(d);
    btn.style.background=bg; btn.style.color=color; btn.style.borderColor=bg;
  }
}

function updateRightPanel() {
  const h = curHole(), idx = S.currentHole;
  const gross = getGross(h);

  document.getElementById('sec-hole-lbl').textContent = `第 ${idx+1} 洞 — PAR ${h.par}`;

  // Par buttons
  [3,4,5].forEach(p => {
    const b = document.getElementById('par'+p);
    b.classList.toggle('active', h.par===p);
  });

  // Distance
  document.getElementById('inp-dist').value = h.distance||'';
  document.getElementById('chk-dist').checked = S.showDist;
  document.getElementById('chk-total').checked = S.showTotal;

  // Gross display
  document.getElementById('gross-disp').textContent = gross!==null ? `Gross: ${gross}杆 (par${h.par}${h.delta>=0?'+':''}${h.delta})` : '';

  // Shot nav
  const hasDelta = h.delta!==null;
  document.getElementById('btn-prev').disabled = !hasDelta;
  document.getElementById('btn-next').disabled = !hasDelta;
  if(hasDelta && gross) {
    document.getElementById('shot-info').textContent = `${h.shotIndex+1} / ${gross}`;
  } else {
    document.getElementById('shot-info').textContent = '— / —';
  }

  // Shot type buttons
  const curType = hasDelta ? (h.shots[h.shotIndex]?.type||'') : '';
  document.querySelectorAll('#type-grp .tbtn').forEach(b => {
    b.classList.toggle('active', b.dataset.type===curType);
  });

  // Auto/manual badge
  const isManual = hasDelta && h.manualTypes[h.shotIndex];
  const badge = document.getElementById('type-mode-badge');
  badge.textContent = isManual ? 'MANUAL' : 'AUTO';
  badge.style.background = isManual ? '#3a2a1a' : '#2a3a2a';
  badge.style.color = isManual ? '#c8843c' : '#5c8c5c';
  badge.style.borderColor = isManual ? '#6a4a2a' : '#3a5a3a';

  // Mode buttons
  document.getElementById('mode-tp').classList.toggle('active', S.displayMode==='topar');
  document.getElementById('mode-gr').classList.toggle('active', S.displayMode==='gross');

  // Score sub opts
  document.getElementById('score-sub').style.display = S.showScore ? 'flex':'none';

  // Status bar
  const modeStr = S.displayMode==='topar'?'TOPAR':'GROSS';
  const dStr = h.delta!==null?fmtDelta(h.delta):'—';
  document.getElementById('status-txt').textContent = `H${idx+1}·P${h.par}·${dStr}·${h.shotIndex+1}/${gross||'?'}·${modeStr}`;
}

// ============================================================
// DELTA PICKER
// ============================================================
function buildPickerItems() {
  const container = document.getElementById('picker-scroll');
  container.innerHTML='';
  const h = curHole();
  for(let d=-3;d<=10;d++) {
    const item = document.createElement('div');
    item.className='picker-item';
    const label = d<=-2?`${d} (Eagle)`:(d===-1?`${d} (Birdie)`:d===0?'E (Par)':d===1?'+1 (Bogey)':d===2?'+2 (Double)':'+'+d);
    item.textContent = label;
    if(h.delta===d) {
      if(d<=-1) item.classList.add('sel-red');
      else if(d===0) item.classList.add('sel-blue');
      else if(d===1) item.classList.add('sel-g1');
      else if(d===2) item.classList.add('sel-g2');
      else item.classList.add('sel-g3');
    }
    item.onclick = () => { setDelta(d); closePicker(); };
    container.appendChild(item);
  }
  // scroll to selected or 0
  setTimeout(() => {
    const h2 = curHole();
    const targetD = h2.delta ?? 0;
    const idx = targetD + 3; // -3 is index 0
    const items = container.querySelectorAll('.picker-item');
    if(items[idx]) items[idx].scrollIntoView({block:'center', behavior:'instant'});
  }, 50);
}

function openPicker() { buildPickerItems(); document.getElementById('picker-modal').classList.add('show'); }
function closePicker() { document.getElementById('picker-modal').classList.remove('show'); }

// ============================================================
// SETTINGS DRAWER
// ============================================================
function openSettings() {
  document.getElementById('settings-drawer').classList.add('open');
  document.getElementById('settings-overlay').classList.add('show');
}
function closeSettings() {
  document.getElementById('settings-drawer').classList.remove('open');
  document.getElementById('settings-overlay').classList.remove('show');
}
function clearBg() {
  const img = document.getElementById('bg-img');
  img.src=''; img.style.display='none';
  document.getElementById('upload-hint').classList.remove('hidden');
  document.getElementById('change-bg-btn').classList.remove('show');
  closeSettings();
}

// ============================================================
// NEW ROUND
// ============================================================
function openNewRound() { document.getElementById('newround-modal').classList.add('show'); }
function closeNewRound() { document.getElementById('newround-modal').classList.remove('show'); }
function doNewRound() {
  const clrScores = document.getElementById('m-scores').checked;
  const rstPars = document.getElementById('m-pars').checked;
  S.holes.forEach(h => {
    if(clrScores) { h.delta=null; h.shots=[]; h.shotIndex=0; h.manualTypes={}; }
    if(rstPars) h.par=4;
  });
  closeNewRound(); render(); scheduleSave();
}

// ============================================================
// CLEAR HOLE (double-tap confirm)
// ============================================================
let clearHoleTap = 0;
function onClearHole() {
  const now = Date.now();
  if(now - clearHoleTap < 1500) { clearHole(); clearHoleTap=0; showToast('本洞已清空'); }
  else { clearHoleTap=now; showToast('再次点击确认清空本洞'); }
}

// ============================================================
// BACKGROUND IMAGE
// ============================================================
function setBgFile(file) {
  if(!file) return;
  const reader = new FileReader();
  reader.onload = ev => {
    const img = document.getElementById('bg-img');
    img.src = ev.target.result;
    img.style.display = 'block';
    img.style.opacity = S.bgOpacity;
    document.getElementById('upload-hint').classList.add('hidden');
    document.getElementById('change-bg-btn').classList.add('show');
  };
  reader.readAsDataURL(file);
}

// ============================================================
// EVENT WIRING
// ============================================================
function wireAll() {
  // Header
  document.getElementById('btn-new').onclick = openNewRound;
  document.getElementById('btn-settings').onclick = openSettings;
  document.getElementById('newround-modal').onclick = e => { if(e.target===document.getElementById('newround-modal')) closeNewRound(); };
  document.getElementById('picker-modal').onclick = e => { if(e.target===document.getElementById('picker-modal')) closePicker(); };

  // Ratio
  document.getElementById('sel-ratio').onchange = e => { S.ratio=e.target.value; render(); scheduleSave(); };

  // Player name
  document.getElementById('inp-player').oninput = e => { S.playerName=e.target.value||'PLAYER'; redrawOnly(); scheduleSave(); };

  // Export
  document.getElementById('btn-export').onclick = doExport;

  // Background
  const bgFile = document.getElementById('bg-file');
  const hint = document.getElementById('upload-hint');
  hint.onclick = () => bgFile.click();
  document.getElementById('change-bg-btn').onclick = () => bgFile.click();
  bgFile.onchange = e => setBgFile(e.target.files[0]);

  // Drag & drop on preview
  const preview = document.getElementById('preview');
  preview.addEventListener('dragover', e => e.preventDefault());
  preview.addEventListener('drop', e => { e.preventDefault(); setBgFile(e.dataTransfer.files[0]); });

  // Dist
  document.getElementById('inp-dist').oninput = e => { curHole().distance=parseInt(e.target.value)||null; redrawOnly(); scheduleSave(); };
  document.getElementById('chk-dist').onchange = e => { S.showDist=e.target.checked; redrawOnly(); scheduleSave(); };
  document.getElementById('chk-total').onchange = e => { S.showTotal=e.target.checked; redrawOnly(); scheduleSave(); };

  // Shot / Score overlays
  document.getElementById('chk-shot').onchange = e => { S.showShot=e.target.checked; render(); scheduleSave(); };
  document.getElementById('chk-score').onchange = e => {
    S.showScore=e.target.checked;
    document.getElementById('score-sub').style.display=e.target.checked?'flex':'none';
    redrawOnly(); scheduleSave();
  };
  document.querySelectorAll('[name=scr]').forEach(r => {
    r.onchange = () => { S.scoreRange=r.value; redrawOnly(); scheduleSave(); };
  });

  // Shot types
  document.querySelectorAll('#type-grp .tbtn').forEach(btn => {
    btn.onclick = () => setShotType(btn.dataset.type);
  });

  // Clear hole (double tap)
  document.getElementById('btn-clear-hole').onclick = onClearHole;

  // Next hole
  document.getElementById('btn-next-hole').onclick = gotoNextHole;

  // PREV/NEXT long press
  setupLongPress(document.getElementById('btn-prev'), prevShot);
  setupLongPress(document.getElementById('btn-next'), nextShot);

  // Settings
  document.getElementById('bg-opacity').oninput = e => {
    const v = parseInt(e.target.value)/100;
    S.bgOpacity = v;
    document.getElementById('bg-opacity-val').textContent = e.target.value+'%';
    const img = document.getElementById('bg-img');
    if(img.src) img.style.opacity = v;
    scheduleSave();
  };
  document.getElementById('chk-sz').onchange = e => { S.safeZone=e.target.checked; redrawOnly(); scheduleSave(); };
  document.getElementById('sz-size').onchange = e => { S.szSize=parseInt(e.target.value); redrawOnly(); scheduleSave(); };

  // Keyboard shortcuts
  window.addEventListener('keydown', e => {
    if(e.target.tagName==='INPUT'||e.target.tagName==='TEXTAREA') return;
    if(e.key==='ArrowRight'||e.key==='.'){ nextShot(); }
    else if(e.key==='ArrowLeft'||e.key===','){ prevShot(); }
    else if(e.key.toLowerCase()==='h'){ gotoNextHole(); }
  });

  // Resize
  window.addEventListener('resize', () => render());
}

function setupLongPress(btn, fn) {
  let timer = null;
  const start = () => { fn(); timer = setInterval(fn, 200); };
  const stop = () => { clearInterval(timer); timer=null; };
  btn.addEventListener('mousedown', start);
  btn.addEventListener('touchstart', e => { e.preventDefault(); start(); }, {passive:false});
  btn.addEventListener('mouseup', stop);
  btn.addEventListener('mouseleave', stop);
  btn.addEventListener('touchend', stop);
}

// ============================================================
// INIT
// ============================================================
function init() {
  loadSaved();
  initCanvas();
  wireAll();

  // Sync UI from state
  document.getElementById('sel-ratio').value = S.ratio;
  document.getElementById('inp-player').value = S.playerName;
  document.getElementById('chk-shot').checked = S.showShot;
  document.getElementById('chk-score').checked = S.showScore;
  document.getElementById('chk-total').checked = S.showTotal;
  document.getElementById('chk-dist').checked = S.showDist;
  document.getElementById('score-sub').style.display = S.showScore ? 'flex':'none';
  document.querySelectorAll('[name=scr]').forEach(r => r.checked = r.value===S.scoreRange);
  document.getElementById('bg-opacity').value = Math.round(S.bgOpacity*100);
  document.getElementById('bg-opacity-val').textContent = Math.round(S.bgOpacity*100)+'%';
  if(S.safeZone) document.getElementById('chk-sz').checked=true;
  document.getElementById('sz-size').value=String(S.szSize);

  render();
}

document.addEventListener('DOMContentLoaded', init);
</script>
